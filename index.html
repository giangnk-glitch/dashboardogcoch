<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>OGC Dashboard v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://apis.google.com/js/api.js"></script>
<style>
:root{
  --bg:#F3F5F9;--sur:#FFF;--brd:#E4E8F0;
  --navy:#0D1B2A;--blue:#1A6FE0;--teal:#0EA47A;--amber:#D97706;--red:#DC2626;--purple:#7C3AED;
  --txt:#0D1B2A;--mut:#6B7A8D;--dim:#9BA8B5;
  --fn:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --nb-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fn);background:var(--bg);color:var(--txt);font-size:13px}

/* LOGIN */
#login{position:fixed;inset:0;background:#0D1B2A;display:flex;align-items:center;justify-content:center;z-index:9999}
.lc{background:#111f30;border:1px solid #1e3a52;border-radius:16px;padding:36px 32px;width:min(320px,90vw);text-align:center}
.lc-logo{font-size:36px;margin-bottom:12px}
.lc-title{font-size:17px;font-weight:600;color:#fff;margin-bottom:3px}
.lc-sub{font-size:11px;color:#4B6380;margin-bottom:24px}
.lc-input{width:100%;background:#0d1b2a;border:1px solid #1e3a52;border-radius:8px;padding:11px 14px;font-size:16px;color:#fff;font-family:var(--mono);letter-spacing:.12em;outline:none;text-align:center;-webkit-appearance:none}
.lc-input:focus{border-color:#1A6FE0}
.lc-btn{width:100%;margin-top:12px;background:#1A6FE0;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;color:#fff;cursor:pointer}
.lc-err{margin-top:8px;font-size:11px;color:#EF4444;min-height:16px}

/* APP */
#app{display:none;height:100vh;flex-direction:column}

/* TOP BAR */
#topbar{background:#fff;border-bottom:1px solid var(--brd);padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100}
.tb-title{font-size:14px;font-weight:600}
.tb-pill{background:var(--navy);color:#fff;font-size:9px;font-family:var(--mono);padding:3px 10px;border-radius:20px}

/* MODE BAR */
#modebar{background:#fff;border-bottom:1px solid var(--brd);flex-shrink:0;overflow-x:auto;scrollbar-width:none;display:flex;padding:0 12px}
.mb-tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--mut);white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.mb-tab.active{color:var(--blue);border-color:var(--blue)}

/* SCROLL AREA */
#scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* DESKTOP LAYOUT */
.desktop-shell{display:grid;grid-template-columns:240px 1fr;min-height:100%}
.sidebar{background:var(--navy);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;color:#fff}
.sb-logo{padding:18px 16px;border-bottom:1px solid #1e3044}
.sb-mark{font-size:14px;font-weight:600}
.sb-sub{font-size:9px;color:#4B6380;margin-top:2px}
.sb-tabs{display:flex;padding:10px;gap:4px}
.sb-tab{flex:1;padding:7px;border-radius:6px;text-align:center;font-size:10px;font-weight:500;cursor:pointer;color:#4B6380;border:1px solid transparent;transition:all .15s}
.sb-tab.active{background:#1A6FE018;color:#60A5FA;border-color:#1A6FE035}
.sb-sec{padding:10px}
.sb-sec-lbl{font-size:9px;color:#4B6380;text-transform:uppercase;margin-bottom:4px}
.sb-items{display:flex;flex-direction:column;gap:2px}
.sb-item{padding:8px;border-radius:6px;cursor:pointer;border:1px solid transparent;font-size:11px;color:#94a3b8;transition:all .15s}
.sb-item:hover{background:#1e3044}
.sb-item.active{background:#1A6FE015;border-color:#1A6FE030;color:#60A5FA}
.sb-bottom{padding:10px;margin-top:auto}
.sb-logout{width:100%;padding:8px;background:#1e3044;border:none;border-radius:6px;color:#94a3b8;cursor:pointer;font-size:10px}

/* MAIN CONTENT */
.desktop-main{padding:20px 24px}
.pg-hdr{margin-bottom:12px}
.pg-title{font-size:18px;font-weight:600;margin-bottom:2px}
.pg-sub{font-size:11px;color:var(--mut)}

/* ALERTS */
.alert-banner{background:#FEF9C3;border:1px solid #D97706;border-radius:8px;padding:12px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start}
.alert-icon{color:#D97706;font-size:14px;flex-shrink:0}
.alert-text{font-size:11px;color:#78350F;line-height:1.5}
.alert.danger{background:#FEE2E2;border-color:#DC2626}
.alert.danger .alert-icon,.alert.danger .alert-text{color:#991B1B}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:#fff;border:1px solid var(--brd);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue)}
.kpi-card.warning::before{background:var(--amber)}
.kpi-card.danger::before{background:var(--red)}
.kpi-lbl{font-size:8px;color:var(--mut);text-transform:uppercase;margin-bottom:6px}
.kpi-val{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--navy)}
.kpi-sub{font-size:9px;color:var(--dim);margin-top:4px}
.kpi-trend{display:inline-block;padding:2px 6px;border-radius:4px;font-size:8px;font-weight:600;margin-top:4px}
.kpi-trend.up{background:#ECFDF5;color:#065F46}
.kpi-trend.down{background:#FEE2E2;color:#991B1B}

/* TABLES */
.panel{background:#fff;border:1px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:20px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:-14px -14px 0}
.table-wrap table{width:100%;border-collapse:collapse;padding:14px}
table th{font-size:8px;font-weight:600;text-transform:uppercase;color:var(--dim);padding:8px;text-align:right;border-bottom:1px solid var(--brd);white-space:nowrap}
table th:first-child{text-align:left}
table td{padding:8px;border-bottom:1px solid #F2F4F8;text-align:right;font-size:10px;color:var(--mut)}
table td:first-child{text-align:left;font-weight:500;color:var(--navy)}

/* RESPONSIVE */
@media(max-width:860px){
  .desktop-shell{display:block}
  .sidebar{display:none}
  .desktop-main{padding:12px 14px}
  #topbar,#modebar{display:flex}
}
@media(min-width:861px){
  #topbar,#modebar{display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lc">
    <div class="lc-logo">🎮</div>
    <div class="lc-title">OGC Cyber Hub</div>
    <div class="lc-sub">v2.0 - Dashboard Nâng Cao</div>
    <input class="lc-input" type="password" id="pw" placeholder="••••••••" maxlength="20">
    <button class="lc-btn" onclick="doLogin()">Đăng nhập</button>
    <div class="lc-err" id="pw-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="topbar">
    <div class="tb-title" id="tb-title">Dashboard</div>
    <div class="tb-pill" id="tb-pill">—</div>
  </div>

  <div id="modebar">
    <div class="mb-tab active" data-mode="day" onclick="setMode('day')">Ngày</div>
    <div class="mb-tab" data-mode="week" onclick="setMode('week')">Tuần</div>
    <div class="mb-tab" data-mode="month" onclick="setMode('month')">Tháng</div>
  </div>

  <div id="scroll-area">
    <div class="desktop-shell">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sb-logo">
          <div class="sb-mark">🎮 OGC / OCH</div>
          <div class="sb-sub">Operations Dashboard</div>
        </div>
        <div class="sb-tabs">
          <div class="sb-tab active" data-mode="day" onclick="setMode('day')">Ngày</div>
          <div class="sb-tab" data-mode="week" onclick="setMode('week')">Tuần</div>
          <div class="sb-tab" data-mode="month" onclick="setMode('month')">Tháng</div>
        </div>
        <div class="sb-sec">
          <div class="sb-sec-lbl" id="sb-lbl">Chọn ngày</div>
          <div class="sb-items" id="sb-items"></div>
        </div>
        <div class="sb-bottom">
          <button class="sb-logout" onclick="doLogout()">🔒 Đăng xuất</button>
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <div class="desktop-main">
        <div class="pg-hdr">
          <div class="pg-title" id="pg-title">Dashboard</div>
          <div class="pg-sub" id="pg-sub"></div>
        </div>

        <div id="alerts-container"></div>

        <div class="kpi-grid" id="kpi-grid"></div>

        <div class="panel">
          <h3 style="font-size:12px;margin-bottom:12px">Chi tiết theo chi nhánh</h3>
          <div class="table-wrap">
            <table id="branch-table">
              <thead>
                <tr>
                  <th>Chi nhánh</th>
                  <th>Doanh thu</th>
                  <th>FNET</th>
                  <th>FNB</th>
                  <th>Mart</th>
                  <th>Traffic</th>
                  <th>NRU</th>
                  <th>ARPPU (FNET)</th>
                </tr>
              </thead>
              <tbody id="branch-tbody"></tbody>
            </table>
          </div>
        </div>

        <div class="panel">
          <h3 style="font-size:12px;margin-bottom:12px">Đề xuất cải thiện</h3>
          <div id="recommendations"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== CONFIG ====================
const PASSWORD = "ogc2024";
const SHEET_ID = "1evs_g8zR1UfGcAzvDI4ZvLCQWPiMCw6IGrK55rmjxJc";
const API_KEY = "YOUR_GOOGLE_API_KEY"; // Bạn cần cấp API key

let currentMode = 'day';
let currentDate = new Date('2026-04-15');
let allData = { daily: {}, weekly: {}, monthly: {} };

// ==================== LOGIN ====================
function doLogin() {
  const pw = document.getElementById('pw').value;
  if (pw === PASSWORD) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    initDashboard();
  } else {
    document.getElementById('pw-err').textContent = 'Mật khẩu không đúng!';
  }
}

function doLogout() {
  document.getElementById('login').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pw').value = '';
  document.getElementById('pw-err').textContent = '';
}

// ==================== DATA ====================
function initDashboard() {
  // Dữ liệu mẫu - trong thực tế lấy từ Google Sheets
  loadSampleData();
  setMode('day');
  renderDashboard();
}

function loadSampleData() {
  // Dữ liệu 2026-04-15 (hôm nay)
  allData.daily = {
    '2026-04-15': {
      date: '2026-04-15',
      chain: {
        dt: 180000000,
        fnet: 108000000,
        fnb: 45000000,
        mart: 27000000,
        traffic: 2400,
        nru: 400,
        ord_fnet: 1400,
        ord_fnb: 950,
        ord_mart: 1250,
        arppu_fnet: 410000
      },
      branches: {
        'Stadium': { dt: 52000000, fnet: 32000000, fnb: 13000000, mart: 7000000, traffic: 600, nru: 95, arppu_fnet: 84000 },
        'Tây Sơn': { dt: 28000000, fnet: 16000000, fnb: 7000000, mart: 5000000, traffic: 380, nru: 65, arppu_fnet: 62000 },
        'Chiến Thắng': { dt: 22000000, fnet: 13000000, fnb: 5500000, mart: 3500000, traffic: 300, nru: 50, arppu_fnet: 68000 },
        'LL Quân': { dt: 30000000, fnet: 18000000, fnb: 7500000, mart: 4500000, traffic: 420, nru: 75, arppu_fnet: 75000 },
        'TQ Hoàn': { dt: 26000000, fnet: 15000000, fnb: 7000000, mart: 4000000, traffic: 350, nru: 65, arppu_fnet: 72000 },
        'Trần Vỹ': { dt: 22000000, fnet: 14000000, fnb: 5000000, mart: 3000000, traffic: 350, nru: 50, arppu_fnet: 78000 }
      }
    }
  };

  // Tính toán trung bình
  allData.avgDaily = {
    dt: 165000000,
    fnet: 98000000,
    fnb: 42000000,
    mart: 25000000,
    traffic: 2200,
    nru: 370,
    arppu_fnet: 395000
  };
}

// ==================== RENDER ====================
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.sb-tab, .mb-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.mode === mode);
  });
  renderDashboard();
}

function renderDashboard() {
  const data = allData.daily['2026-04-15'];
  
  // Title
  document.getElementById('pg-title').textContent = 
    currentMode === 'day' ? 'Dashboard Ngày 15/04/2026' :
    currentMode === 'week' ? 'Dashboard Tuần 2 Tháng 4' : 'Dashboard Tháng 4';

  // Alerts
  renderAlerts(data);

  // KPIs
  renderKPIs(data);

  // Table
  renderBranchTable(data);

  // Recommendations
  renderRecommendations(data);
}

function renderAlerts(data) {
  const alerts = [];
  const chain = data.chain;
  const avg = allData.avgDaily;

  // Cảnh báo doanh thu
  if (chain.dt < avg.dt * 0.9) {
    alerts.push({
      type: 'warning',
      title: 'Cảnh báo Doanh thu',
      msg: `Doanh thu hôm nay (${format(chain.dt)}) thấp hơn 10% so với trung bình (${format(avg.dt)})`
    });
  }

  // Cảnh báo NRU
  if (chain.nru < avg.nru * 0.85) {
    alerts.push({
      type: 'danger',
      title: 'Cảnh báo NRU',
      msg: `Số khách hàng (${chain.nru}) thấp hơn 15% so với trung bình (${avg.nru})`
    });
  }

  // Cảnh báo Traffic
  if (chain.traffic < avg.traffic * 0.8) {
    alerts.push({
      type: 'danger',
      title: 'Cảnh báo Traffic',
      msg: `Lưu lượng (${chain.traffic}) giảm 20% so với trung bình`
    });
  }

  const html = alerts.map(a => `
    <div class="alert-banner ${a.type}">
      <div class="alert-icon">⚠️</div>
      <div>
        <div style="font-weight:600">${a.title}</div>
        <div class="alert-text">${a.msg}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('alerts-container').innerHTML = html;
}

function renderKPIs(data) {
  const chain = data.chain;
  const avg = allData.avgDaily;

  const kpis = [
    { label: 'Doanh thu', val: chain.dt, avg: avg.dt, unit: 'đ' },
    { label: 'FNET', val: chain.fnet, avg: avg.fnet, unit: 'đ' },
    { label: 'FNB', val: chain.fnb, avg: avg.fnb, unit: 'đ' },
    { label: 'Mart', val: chain.mart, avg: avg.mart, unit: 'đ' },
    { label: 'Traffic', val: chain.traffic, avg: avg.traffic, unit: 'lượt' },
    { label: 'NRU', val: chain.nru, avg: avg.nru, unit: 'người' },
  ];

  const html = kpis.map(kpi => {
    const pct = ((kpi.val - kpi.avg) / kpi.avg * 100).toFixed(1);
    const trend = pct >= 0 ? 'up' : 'down';
    const status = kpi.val < kpi.avg * 0.85 ? 'danger' : kpi.val < kpi.avg * 0.95 ? 'warning' : '';

    return `
      <div class="kpi-card ${status}">
        <div class="kpi-lbl">${kpi.label}</div>
        <div class="kpi-val">${format(kpi.val)}</div>
        <div class="kpi-sub">${kpi.unit}</div>
        <div class="kpi-trend ${trend}">
          ${trend === 'up' ? '↑' : '↓'} ${Math.abs(pct)}%
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('kpi-grid').innerHTML = html;
}

function renderBranchTable(data) {
  const branches = data.branches;
  const html = Object.entries(branches).map(([name, br]) => `
    <tr>
      <td>${name}</td>
      <td>${format(br.dt)}</td>
      <td>${format(br.fnet)}</td>
      <td>${format(br.fnb)}</td>
      <td>${format(br.mart)}</td>
      <td>${br.traffic}</td>
      <td>${br.nru}</td>
      <td>${format(br.arppu_fnet)}</td>
    </tr>
  `).join('');

  document.getElementById('branch-tbody').innerHTML = html;
}

function renderRecommendations(data) {
  const chain = data.chain;
  const avg = allData.avgDaily;
  const recs = [];

  if (chain.traffic < avg.traffic) {
    recs.push('📱 <strong>Tăng marketing:</strong> Traffic giảm, tăng quảng cáo trên mạng xã hội và Google Ads');
  }

  if (chain.nru < avg.nru) {
    recs.push('👥 <strong>Chương trình khuyến mãi:</strong> Tăng số lượng khách mới với discount cho khách hàng lần đầu');
  }

  if (chain.dt < avg.dt) {
    recs.push('💰 <strong>Upsell & Cross-sell:</strong> Tập trung bán thêm sản phẩm giá cao cho khách hiện tại');
  }

  if (chain.arppu_fnet < avg.arppu_fnet) {
    recs.push('🎁 <strong>Bundle sản phẩm:</strong> Tạo gói combo để tăng giá trị trung bình đơn hàng');
  }

  const html = recs.map(r => `<div style="padding:8px;border-left:3px solid #1A6FE0;margin-bottom:8px">${r}</div>`).join('');
  document.getElementById('recommendations').innerHTML = html;
}

// ==================== HELPERS ====================
function format(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
  if (num >= 1000) return (num / 1000).toFixed(0) + 'K';
  return num.toFixed(0);
}

// Load on start
window.onload = () => {
  document.getElementById('pw').focus();
};
</script>

</body>
</html>
