<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>OGC Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#F3F5F9;--sur:#FFF;--brd:#E4E8F0;
  --navy:#0D1B2A;--blue:#1A6FE0;--teal:#0EA47A;--amber:#D97706;--red:#DC2626;--purple:#7C3AED;
  --txt:#0D1B2A;--mut:#6B7A8D;--dim:#9BA8B5;
  --fn:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --nb-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fn);background:var(--bg);color:var(--txt);font-size:13px}

/* ── LOGIN ── */
#login{position:fixed;inset:0;background:#0D1B2A;display:flex;align-items:center;justify-content:center;z-index:9999}
.lc{background:#111f30;border:1px solid #1e3a52;border-radius:16px;padding:36px 32px;width:min(320px,90vw);text-align:center}
.lc-logo{font-size:36px;margin-bottom:12px}
.lc-title{font-size:17px;font-weight:600;color:#fff;margin-bottom:3px}
.lc-sub{font-size:11px;color:#4B6380;margin-bottom:24px}
.lc-input{width:100%;background:#0d1b2a;border:1px solid #1e3a52;border-radius:8px;padding:11px 14px;font-size:16px;color:#fff;font-family:var(--mono);letter-spacing:.12em;outline:none;text-align:center;-webkit-appearance:none}
.lc-input:focus{border-color:#1A6FE0}
.lc-btn{width:100%;margin-top:12px;background:#1A6FE0;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;color:#fff;cursor:pointer}
.lc-err{margin-top:8px;font-size:11px;color:#EF4444;min-height:16px}

/* ── APP SHELL ── */
#app{display:none;height:100%;flex-direction:column}

/* Top bar (mobile only) */
#topbar{display:none;background:#fff;border-bottom:1px solid var(--brd);padding:0 16px;height:48px;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100}
.tb-title{font-size:14px;font-weight:600;color:var(--navy)}
.tb-pill{background:var(--navy);color:#fff;font-size:9px;font-family:var(--mono);padding:3px 10px;border-radius:20px}

/* Mode bar (mobile only) */
#modebar{display:none;background:#fff;border-bottom:1px solid var(--brd);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#modebar::-webkit-scrollbar{display:none}
.mb-inner{display:flex;padding:0 12px}
.mb-tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--mut);white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.mb-tab.active{color:var(--blue);border-color:var(--blue)}

/* Scroll area */
#scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* Bottom nav */
#bottom-nav{display:none;background:#fff;border-top:1px solid var(--brd);height:var(--nb-h);flex-shrink:0;position:sticky;bottom:0;z-index:100}
.bn-inner{display:grid;grid-template-columns:repeat(5,1fr);height:100%}
.bn-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--dim);border:none;background:none;font-family:var(--fn);transition:color .15s;-webkit-tap-highlight-color:transparent}
.bn-btn.active{color:var(--blue)}
.bn-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.bn-btn .bn-lbl{font-size:10px;font-weight:500}

/* Drawer */
#drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200}
#drawer{position:fixed;top:0;bottom:0;left:0;width:min(280px,85vw);background:#111827;transform:translateX(-100%);transition:transform .25s ease;z-index:201;display:flex;flex-direction:column;overflow:hidden}
#drawer.open{transform:translateX(0)}
#drawer-overlay.show{display:block}
.dr-head{padding:16px;border-bottom:1px solid #1e3044;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dr-head-title{font-size:13px;font-weight:600;color:#fff}
.dr-close{background:none;border:none;color:#6B7A8D;font-size:20px;cursor:pointer;line-height:1;padding:0}
/* Mode switcher inside drawer */
.dr-modes{display:flex;gap:4px;padding:10px 12px 6px;flex-shrink:0}
.dr-mode{flex:1;padding:6px 4px;border-radius:6px;text-align:center;font-size:11px;font-weight:500;cursor:pointer;color:#4B6380;border:1px solid transparent;transition:all .15s}
.dr-mode.active{background:#1A6FE020;color:#60A5FA;border-color:#1A6FE040}
/* Drawer list */
.dr-list{flex:1;overflow-y:auto;padding:4px 8px 16px;-webkit-overflow-scrolling:touch}
.dr-group{font-size:9px;color:#4B6380;text-transform:uppercase;letter-spacing:.08em;padding:8px 6px 3px}
.dr-item{display:flex;align-items:center;gap:8px;padding:8px 8px;border-radius:7px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;transition:background .1s;-webkit-tap-highlight-color:transparent}
.dr-item:hover,.dr-item:active{background:#1e3044}
.dr-item.active{background:#1A6FE015;border-color:#1A6FE030}
.dr-item-tag{font-family:var(--mono);font-size:10px;color:#7B94AD;min-width:36px}
.dr-item.active .dr-item-tag{color:#60A5FA}
.dr-item-days{font-size:9px;color:#4B6380;min-width:28px}
.dr-item-val{font-size:10px;color:#6B7A8D;text-align:right;flex:1;font-family:var(--mono)}
.dr-item.active .dr-item-val{color:#93C5FD}
/* Toggle inside drawer */
.dr-toggle{display:flex;background:#0d1b2a;border-radius:6px;padding:2px;margin:0 12px 8px;flex-shrink:0}
.dr-toggle-btn{flex:1;padding:5px 8px;border-radius:5px;font-size:10px;font-weight:500;cursor:pointer;color:#4B6380;text-align:center;transition:all .12s}
.dr-toggle-btn.active{background:#1e3044;color:#e2e8f0}

/* ── DESKTOP LAYOUT ── */
.desktop-shell{display:grid;grid-template-columns:210px 1fr;min-height:100vh}
.sidebar{background:var(--navy);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid #1e3044}
.sb-mark{font-size:14px;font-weight:600;color:#fff}
.sb-sub{font-size:9px;color:#4B6380;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.sb-mode-tabs{display:flex;padding:10px 10px 0;gap:4px}
.sb-mode-tab{flex:1;padding:7px 4px;border-radius:6px;text-align:center;font-size:10px;font-weight:500;cursor:pointer;color:#4B6380;border:1px solid transparent;transition:all .15s}
.sb-mode-tab:hover{background:#1e3044;color:#94a3b8}
.sb-mode-tab.active{background:#1A6FE018;color:#60A5FA;border-color:#1A6FE035}
.sb-sec{padding:10px 10px 0}
.sb-sec-lbl{font-size:9px;color:#4B6380;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.sb-grp{font-size:9px;color:#4B6380;padding:5px 8px 2px;text-transform:uppercase;letter-spacing:.06em}
.sb-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;transition:background .12s}
.sb-item:hover{background:#1e3044}
.sb-item.active{background:#1A6FE018;border-color:#1A6FE040}
.sb-item-tag{font-family:var(--mono);font-size:10px;color:#7B94AD;min-width:38px}
.sb-item.active .sb-item-tag{color:#60A5FA}
.sb-item-days{font-size:9px;color:#4B6380;min-width:30px}
.sb-item-val{font-size:9px;color:#6B7A8D;flex:1;text-align:right;font-family:var(--mono)}
.sb-item.active .sb-item-val{color:#93C5FD}
.sb-div{border:none;border-top:1px solid #1e3044;margin:8px 0}
.sb-bottom{padding:10px 12px;margin-top:auto}
.sb-vt{display:flex;background:#0d1b2a;border-radius:6px;padding:2px;gap:1px}
.sb-vt-btn{flex:1;padding:5px 6px;border-radius:5px;font-size:9px;font-weight:500;cursor:pointer;color:#4B6380;text-align:center;transition:all .12s}
.sb-vt-btn.active{background:#1e3044;color:#e2e8f0}
.sb-footer{font-size:9px;color:#4B6380;line-height:1.6;margin-top:8px}
.sb-logout{width:100%;margin-top:8px;background:#1e3044;border:none;border-radius:6px;padding:7px;font-size:10px;color:#4B6380;cursor:pointer;font-family:var(--fn)}
.sb-logout:hover{background:#2a3f55;color:#94a3b8}
.desktop-main{padding:20px 24px}

/* ── CONTENT ── */
.pg-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.pg-title{font-size:17px;font-weight:600;letter-spacing:-.02em}
.pg-sub{font-size:11px;color:var(--mut);margin-top:2px}
.hdr-pill{background:var(--navy);color:#fff;font-size:10px;font-family:var(--mono);padding:5px 12px;border-radius:20px;white-space:nowrap}
.info-bar{background:#EEF4FF;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;flex-wrap:wrap;align-items:center;gap:10px 14px}
.ib-item{display:flex;flex-direction:column;gap:1px}
.ib-lbl{font-size:8px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
.ib-val{font-family:var(--mono);font-weight:500;color:var(--navy);font-size:11px}
.ib-sep{width:1px;height:22px;background:var(--brd)}
.alert{padding:8px 14px;margin-bottom:12px;font-size:11px;display:flex;align-items:flex-start;gap:8px;line-height:1.6;border-left:3px solid}
.al-ok{background:#ECFDF5;border-color:#0EA47A;color:#065F46}
.al-warn{background:#FEF9C3;border-color:#D97706;color:#78350F}
.kpi-strip{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px;margin-bottom:12px}
.kc{background:var(--sur);border:1px solid var(--brd);border-radius:10px;padding:12px 11px;position:relative;overflow:hidden}
.kc::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:2px 2px 0 0}
.kc.bl::after{background:var(--blue)}.kc.tl::after{background:var(--teal)}.kc.am::after{background:var(--amber)}.kc.pu::after{background:var(--purple)}.kc.rd::after{background:var(--red)}.kc.nv::after{background:var(--navy)}
.kc-lbl{font-size:8px;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.kc-val{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--navy);line-height:1}
.kc-sub{font-size:9px;color:var(--dim);margin-top:4px}
.g2{display:grid;grid-template-columns:1.5fr 1fr;gap:10px;margin-bottom:10px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:10px}
.g2e{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.panel{background:var(--sur);border:1px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:0}
.mb10{margin-bottom:10px}
.pt{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.pt span{font-weight:400;text-transform:none;letter-spacing:0;font-size:9px;color:var(--dim)}
/* Table - always scrollable */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -14px;padding:0 14px}
.bt{width:100%;border-collapse:collapse;font-size:11px;min-width:480px}
.bt th{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);padding:4px 8px;text-align:right;border-bottom:1px solid var(--brd);white-space:nowrap}
.bt th:first-child{text-align:left;padding-left:0}
.bt td{padding:7px 8px;border-bottom:1px solid #F2F4F8;text-align:right;font-family:var(--mono);font-size:10px;color:var(--mut);white-space:nowrap}
.bt td:first-child{text-align:left;font-family:var(--fn);font-weight:500;color:var(--navy);font-size:11px;padding-left:0}
.bt tr:last-child td{border-bottom:none}
.bt .tr-tot{font-weight:600;border-top:1.5px solid var(--brd);background:#F7F9FC}
.bt .tr-tot td{color:var(--navy)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px}
.badge{display:inline-block;padding:1px 6px;border-radius:20px;font-size:8px;font-weight:600;font-family:var(--mono)}
.bup{background:#ECFDF5;color:#065F46}.bdn{background:#FEF2F2;color:#991B1B}.bwn{background:#FEF9C3;color:#78350F}
/* Bar rows */
.br-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.br-n{color:var(--mut);flex-shrink:0;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:90px}
.br-t{flex:1;background:#EEF1F6;border-radius:3px;height:5px;position:relative;overflow:hidden}
.br-f{height:100%;border-radius:3px;position:absolute;left:0;top:0}
.br-v{width:50px;text-align:right;font-family:var(--mono);font-size:9px;color:var(--navy)}
/* KPI bars */
.kb-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.kb-n{color:var(--mut);flex-shrink:0;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:90px}
.kb-t{flex:1;background:#EEF1F6;border-radius:3px;height:7px;position:relative;overflow:hidden}
.kb-f{height:100%;border-radius:3px;position:absolute;left:0;top:0}
.kb-pct{width:42px;text-align:right;font-family:var(--mono);font-size:10px;font-weight:500;flex-shrink:0}
/* Charts */
.cw{position:relative;width:100%}
.h150{height:150px}.h180{height:180px}.h200{height:200px}.h220{height:220px}
.leg{display:flex;flex-wrap:wrap;gap:8px;font-size:9px;color:var(--mut);margin-bottom:6px}
.ld{width:7px;height:7px;border-radius:2px;display:inline-block;margin-right:3px}

@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.panel,.kc{animation:fi .2s ease both}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}

/* ── RESPONSIVE ── */
@media(max-width:860px){
  .desktop-shell{display:block}
  .sidebar{display:none}
  .desktop-main{padding:12px 14px 0}
  #topbar,#modebar,#bottom-nav{display:flex}
  #app{display:none;height:100vh}
  .kpi-strip{grid-template-columns:repeat(3,1fr);gap:6px}
  .kc{padding:10px 9px}
  .kc-val{font-size:15px}
  .kc-lbl{font-size:7px}
  .kc-sub{font-size:8px}
  .g2,.g3,.g2e{grid-template-columns:1fr}
  .panel{padding:12px}
  .tbl-wrap{margin:0 -12px;padding:0 12px}
  .ib-sep{display:none}
  .pg-hdr{display:none}
  .h220{height:180px}
  .h200{height:160px}
  .h180{height:140px}
  .h150{height:130px}
}
@media(min-width:861px){
  #app{display:block!important}
  .desktop-shell{display:grid!important}
}
@media print{
  #login,#topbar,#modebar,#bottom-nav,#drawer,#drawer-overlay{display:none!important}
  .desktop-main{padding:8px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lc">
    <div class="lc-logo">🎮</div>
    <div class="lc-title">OGC Cyber Hub</div>
    <div class="lc-sub">OEG · Nội bộ — Đăng nhập để xem</div>
    <input class="lc-input" type="text" id="lc-user" placeholder="tài khoản…" autocomplete="username" style="margin-bottom:8px;letter-spacing:normal;text-align:left" onkeydown="if(event.key==='Enter')document.getElementById('pw').focus()">
    <input class="lc-input" type="password" id="pw" placeholder="mật khẩu…" maxlength="30" autocomplete="current-password">
    <button class="lc-btn" onclick="doLogin()">Đăng nhập</button>
    <div class="lc-err" id="pw-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- Mobile top bar -->
  <div id="topbar">
    <div class="tb-title" id="tb-title">Dashboard</div>
    <div class="tb-pill" id="tb-pill">—</div>
  </div>

  <!-- Mobile mode tabs -->
  <div id="modebar">
    <div class="mb-inner">
      <div class="mb-tab active" data-mode="day"   onclick="setMode('day')">Ngày</div>
      <div class="mb-tab"       data-mode="week"  onclick="setMode('week')">Tuần</div>
      <div class="mb-tab"       data-mode="month" onclick="setMode('month')">Tháng</div>
    </div>
  </div>

  <!-- Scroll area -->
  <div id="scroll-area">
    <!-- Desktop shell (also used on mobile via single-col) -->
    <div class="desktop-shell">

      <!-- Desktop sidebar -->
      <aside class="sidebar">
        <div class="sb-logo">
          <div class="sb-mark">🎮 OGC / OCH</div>
          <div class="sb-sub">Operations Dashboard</div>
        </div>
        <div class="sb-mode-tabs">
          <div class="sb-mode-tab active" data-mode="day"   onclick="setMode('day')">Ngày</div>
          <div class="sb-mode-tab"        data-mode="week"  onclick="setMode('week')">Tuần</div>
          <div class="sb-mode-tab"        data-mode="month" onclick="setMode('month')">Tháng</div>
        </div>
        <div class="sb-sec">
          <div class="sb-sec-lbl" id="sb-lbl">Chọn ngày</div>
          <div id="sb-list"></div>
        </div>
        <hr class="sb-div">
        <div class="sb-bottom">
          <div class="sb-sec-lbl" style="margin-bottom:5px">Hiển thị</div>
          <div class="sb-vt">
            <div class="sb-vt-btn active" id="vt-tot" onclick="setView('total')">Tổng</div>
            <div class="sb-vt-btn" id="vt-avg" onclick="setView('avg')">TB/ngày</div>
          </div>
          <div class="sb-footer">Quy ước: W1=ngày 1→CN đầu<br>KPI tuần=KPI/ngày×ngày tuần</div>
          <button class="sb-logout" onclick="doLogout()">🔒 Đăng xuất</button>
        </div>
      </aside>

      <!-- Main content -->
      <div class="desktop-main">
        <div class="pg-hdr">
          <div>
            <div class="pg-title" id="pg-title">Dashboard</div>
            <div style="font-size:11px;color:var(--mut);margin-top:2px" id="pg-sub"></div>
          </div>
          <div class="hdr-pill" id="pg-pill">—</div>
        </div>
        <div class="alert al-ok" id="alert-bar" style="display:none"></div>
        <div class="info-bar" id="info-bar"></div>
        <div class="kpi-strip" id="kpi-strip"></div>
        <div id="main-content"></div>
      </div>
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <div id="bottom-nav">
    <div class="bn-inner">
      <button class="bn-btn active" id="bn-day" onclick="setMode('day')">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span class="bn-lbl">Ngày</span>
      </button>
      <button class="bn-btn" id="bn-week" onclick="setMode('week')">
        <svg viewBox="0 0 24 24"><rect x="3" y="9" width="4" height="12" rx="1"/><rect x="10" y="5" width="4" height="16" rx="1"/><rect x="17" y="2" width="4" height="19" rx="1"/></svg>
        <span class="bn-lbl">Tuần</span>
      </button>
      <button class="bn-btn" id="bn-month" onclick="setMode('month')">
        <svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        <span class="bn-lbl">Tháng</span>
      </button>
      <button class="bn-btn" id="bn-choose" onclick="openDrawer()">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <span class="bn-lbl">Chọn</span>
      </button>
      <button class="bn-btn" id="bn-view" onclick="toggleView()">
        <svg viewBox="0 0 24 24" id="bn-view-svg"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M4.22 4.22l2.12 2.12m11.32 11.32 2.12 2.12M2 12h3m14 0h3"/></svg>
        <span class="bn-lbl" id="bn-view-lbl">Tổng</span>
      </button>
    </div>
  </div>
</div>

<!-- Drawer -->
<div id="drawer-overlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <div class="dr-head">
    <span class="dr-head-title" id="dr-title">Chọn</span>
    <button class="dr-close" onclick="closeDrawer()">✕</button>
  </div>
  <!-- Mode switcher in drawer -->

/* ══ ANOMALY ENGINE ══════════════════════════════════════════════ */
function computeAnomalies(mode, cur){
  const alerts = [];
  const now = new Date();

  if(mode==='day'){
    const d=DAILY[cur]; if(!d)return[];
    const br=d.branches;
    const mo=d.month;
    const days7=Object.keys(DAILY).sort().slice(-8,-1); // last 7 days before today

    for(const b of BRANCHES){
      const bk=KPI[b]?.[mo]; if(!bk||!br[b])continue;
      const bd=br[b];
      const kpiDTTB=bk.dttb||0;
      const kpiNRU=bk.nru||0;
      const dt=bd.dt||0;
      const nru=bd.nru||0;
      const traffic=bd.traffic||0;

      // Avg of last 7 days for this branch
      const prev7=days7.map(dk=>DAILY[dk]?.branches?.[b]).filter(Boolean);
      const avgDT7=prev7.length?prev7.reduce((s,x)=>s+(x.dt||0),0)/prev7.length:0;
      const avgTraffic7=prev7.length?prev7.reduce((s,x)=>s+(x.traffic||0),0)/prev7.length:0;
      const avgNRU7=prev7.length?prev7.reduce((s,x)=>s+(x.nru||0),0)/prev7.length:0;
      const avgCR7=prev7.length?prev7.reduce((s,x)=>s+(x.cr_fnet||0),0)/prev7.length:0;
      const avgARPPU7=prev7.length?prev7.reduce((s,x)=>s+(x.arppu_fnet||0),0)/prev7.length:0;

      const pctKPI=kpiDTTB>0?dt/kpiDTTB:0;
      const pctAvg7=avgDT7>0?dt/avgDT7:1;
      const pctTraffic=avgTraffic7>0?traffic/avgTraffic7:1;
      const pctNRU=avgNRU7>0?nru/avgNRU7:1;
      const pctCR=avgCR7>0?(bd.cr_fnet||0)/avgCR7:1;
      const pctARPPU=avgARPPU7>0?(bd.arppu_fnet||0)/avgARPPU7:1;

      // DT < 70% KPI daily target
      if(pctKPI<0.7 && kpiDTTB>0)
        alerts.push({branch:b,level:'danger',metric:'DT vs KPI',
          msg:`DT hôm nay chỉ đạt ${fP(pctKPI)} mục tiêu ngày`,
          value:`${fM(dt)} / ${fM(kpiDTTB)}`,
          action:'Kiểm tra lý do giảm: sự cố máy, ít nhân sự, sự kiện cạnh tranh. Tung combo giờ cao điểm.'});
      else if(pctKPI<0.8 && kpiDTTB>0)
        alerts.push({branch:b,level:'warn',metric:'DT vs KPI',
          msg:`DT đạt ${fP(pctKPI)} mục tiêu — dưới 80%`,
          value:`${fM(dt)} / ${fM(kpiDTTB)}`,
          action:'Tăng cường khuyến mãi buổi chiều/tối. Nhắc nhở khách nạp thêm giờ chơi.'});

      // DT giảm >25% so với 7 ngày trước
      if(pctAvg7<0.75 && avgDT7>0)
        alerts.push({branch:b,level:'warn',metric:'DT vs 7 ngày',
          msg:`DT giảm ${fP(1-pctAvg7)} so với TB 7 ngày gần nhất`,
          value:`${fM(dt)} vs TB ${fM(Math.round(avgDT7))}`,
          action:'Xem xét nguyên nhân: ngày trong tuần, thời tiết, đối thủ. Check lại chương trình khuyến mãi.'});

      // Traffic giảm bất thường >20%
      if(pctTraffic<0.8 && avgTraffic7>0)
        alerts.push({branch:b,level:'warn',metric:'Traffic',
          msg:`Traffic giảm ${fP(1-pctTraffic)} so với TB 7 ngày`,
          value:`${fN(traffic)} lượt vs TB ${fN(Math.round(avgTraffic7))}`,
          action:'Kiểm tra máy hoạt động, chất lượng dịch vụ. Thông báo khuyến mãi qua kênh Zalo/Facebook.'});

      // NRU thấp (< 60% KPI)
      if(kpiNRU>0 && nru/kpiNRU<0.6)
        alerts.push({branch:b,level:'warn',metric:'NRU',
          msg:`Khách mới chỉ đạt ${fP(nru/kpiNRU)} mục tiêu NRU`,
          value:`${nru} TK vs KPI ${kpiNRU}`,
          action:'Tăng cường referral (giới thiệu bạn), event thu hút khách mới. Xem lại chất lượng phục vụ.'});

      // CR Fnet bất thường (giảm >30% hoặc tăng >50%)
      if(avgCR7>0 && pctCR<0.7)
        alerts.push({branch:b,level:'info',metric:'CR Fnet',
          msg:`Tỷ lệ chuyển đổi Fnet giảm mạnh ${fP(1-pctCR)}`,
          value:`${fP(bd.cr_fnet||0)} vs TB ${fP(avgCR7)}`,
          action:'Kiểm tra số máy hoạt động, chất lượng game. Nhân viên cần chủ động mời khách đăng ký tài khoản.'});

      // ARPPU Fnet bất thường giảm >30%
      if(avgARPPU7>0 && pctARPPU<0.7 && (bd.arppu_fnet||0)>0)
        alerts.push({branch:b,level:'info',metric:'ARPPU Fnet',
          msg:`Chi tiêu TB/đơn Fnet giảm ${fP(1-pctARPPU)}`,
          value:`${fK(bd.arppu_fnet||0)} vs TB ${fK(Math.round(avgARPPU7))}`,
          action:'Khuyến khích khách mua combo giờ dài hơn. Tạo gói giờ chơi ưu đãi theo nhóm.'});
    }

  } else if(mode==='month'){
    const m=MONTHLY[cur]; if(!m)return[];
    for(const b of BRANCHES){
      const bd=m.branches?.[b]; if(!bd)continue;
      const pct=bd.kpi_pct||0;
      const daysGone=Object.keys(DAILY).filter(dk=>DAILY[dk].month===m.month).length;
      const daysTotal=bd.days||30;
      const progress=daysGone/daysTotal;
      // If behind pace
      if(pct<progress*0.85 && pct>0)
        alerts.push({branch:b,level:'warn',metric:'Lũy kế tháng',
          msg:`Lũy kế đạt ${fP(pct)} KPI — thấp hơn tiến độ thời gian (${fP(progress)})`,
          value:`${fM(bd.dt)} / ${fM(bd.kpi_total)}`,
          action:`Cần ${fM(Math.round((bd.kpi_total-bd.dt)/(daysTotal-daysGone)))/day} mỗi ngày còn lại. Đẩy mạnh giờ cao điểm cuối tháng.`});
      if(pct<0.7 && pct>0)
        alerts.push({branch:b,level:'danger',metric:'KPI tháng',
          msg:`Doanh thu tháng chỉ đạt ${fP(pct)} chỉ tiêu`,
          value:`${fM(bd.dt)} / ${fM(bd.kpi_total)}`,
          action:'Cần kế hoạch cứu KPI: event cuối tháng, combo đặc biệt, đẩy kênh FnB và Mart bù.'});
    }
  }

  return alerts;
}

            <div style="font-size:11px;font-weight:600;color:${c2.tc}">${a.metric}: ${a.msg}</div>
            <div style="font-size:11px;color:#6B7A8D;margin:2px 0">${a.value}</div>
            <div style="font-size:11px;color:#374151;background:rgba(0,0,0,.04);border-radius:5px;padding:4px 8px;margin-top:4px">
              💡 ${a.action}
            </div>
          </div>`}).join('')}
      </div>
    </div>`;
  }
  el.innerHTML=html;
}

// Thay API_URL bằng URL từ Google Apps Script sau khi deploy
const API_URL = 'https://script.google.com/macros/s/AKfycbyfpXv94b0HkeeBQqRS4S_Mc2zlItF7MHxb21ndMHIB2sXTtB0zqtAAgqtZcrs7RmKR/exec'; // ← DÁN URL APPS SCRIPT VÀO ĐÂY

let _dataLoaded = false;

async function loadLiveData() {
  if (!API_URL) { _dataLoaded = true; return false; }
  try {
    const res = await fetch(API_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    // Inject fresh data into globals
    if (data.DAILY && Object.keys(data.DAILY).length > 0) {
      Object.keys(DAILY).forEach(k => delete DAILY[k]);
      Object.assign(DAILY, data.DAILY);
    }
    if (data.WEEKLY && Object.keys(data.WEEKLY).length > 0) {
      Object.keys(WEEKLY).forEach(k => delete WEEKLY[k]);
      Object.assign(WEEKLY, data.WEEKLY);
    }
    if (data.MONTHLY && Object.keys(data.MONTHLY).length > 0) {
      Object.keys(MONTHLY).forEach(k => delete MONTHLY[k]);
      Object.assign(MONTHLY, data.MONTHLY);
    }
    if (data.KPI && Object.keys(data.KPI).length > 0) {
      Object.keys(KPI).forEach(k => delete KPI[k]);
      Object.assign(KPI, data.KPI);
    }

    // Show update status
    const lastDate = Object.keys(DAILY).sort().pop() || '—';
    showToast('✅ Dữ liệu cập nhật đến ' + lastDate, 'success');
    _dataLoaded = true;
    return true;
  } catch(e) {
    console.warn('Live fetch failed, using embedded data:', e.message);
    showToast('⚠️ Dùng dữ liệu lưu trữ (offline)', 'warn');
    _dataLoaded = true;
    return false;
  }
}

  const styles = {
    success: 'background:#0EA47A;color:#fff',
    warn:    'background:#D97706;color:#fff',
    info:    'background:#1A6FE0;color:#fff',
  };
  t.style.cssText += ';' + (styles[type] || styles.info);
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 3500);
}

function startApp(){
  const el=document.getElementById('app');
  el.style.display='flex';
  el.style.flexDirection='column';
  el.style.height='100%';

  render();

/* ── SET MODE ── */
function setMode(m){

  document.querySelectorAll('[data-mode]').forEach(el=>{
    el.classList.toggle('active', el.dataset.mode===m);
  });

/* ── BUILD SIDEBAR / DRAWER LISTS ── */
function buildSbList(){
  const lbl=document.getElementById('sb-lbl');
  const list=document.getElementById('sb-list');
  if(!lbl||!list)return;
  const labels={day:'Chọn ngày',week:'Chọn tuần',month:'Chọn tháng'};
  lbl.textContent=labels[MODE];
  list.innerHTML=buildListHTML();
  // Set default CUR if not set or wrong mode
  if(!CUR || !validCurForMode()) setCurDefault();
  highlightSbItem(CUR);
}

function buildDrList(){
  const labels={day:'Chọn ngày',week:'Chọn tuần',month:'Chọn tháng'};
  document.getElementById('dr-title').textContent=labels[MODE];
  document.getElementById('dr-list').innerHTML=buildListHTML(true);
  document.getElementById('dr-toggle').style.display=MODE!=='day'?'flex':'none';
  // Sync mode tabs in drawer
  document.querySelectorAll('.dr-mode').forEach(el=>{
    el.classList.toggle('active',el.dataset.mode===MODE);
  });
  highlightDrItem(CUR);
}

function buildListHTML(forDrawer){
  let html='';
  const itemCls=forDrawer?'dr-item':'sb-item';
  const tagCls=forDrawer?'dr-item-tag':'sb-item-tag';
  const daysCls=forDrawer?'dr-item-days':'sb-item-days';
  const valCls=forDrawer?'dr-item-val':'sb-item-val';
  const grpCls=forDrawer?'dr-group':'sb-grp';
  const onclick=forDrawer
    ?k=>`onclick="selectItem('${k}');closeDrawer()"`
    :k=>`onclick="selectItem('${k}')"`;

  if(MODE==='day'){
    const days=Object.keys(DAILY).sort().reverse();
    let lastMo=null;
    days.forEach(dk=>{
      const d=DAILY[dk];
      if(d.month!==lastMo){html+=`<div class="${grpCls}">Tháng ${d.month}</div>`;lastMo=d.month}
      const dt=Object.values(d.branches||{}).reduce((s,b)=>s+(b.dt||0),0);
      const dd=new Date(dk+'T00:00');
      const thu=['CN','T2','T3','T4','T5','T6','T7'][dd.getDay()];
      html+=`<div class="${itemCls}" data-key="${dk}" ${onclick(dk)}>
        <span class="${tagCls}">${thu} ${dk.slice(8)}</span>
        <span class="${daysCls}">W${d.week}</span>
        <span class="${valCls}">${fM(dt)}</span>
      </div>`;
    });
  } else if(MODE==='week'){
    let lastMo=null;
    Object.keys(WEEKLY).forEach(wk=>{
      const w=WEEKLY[wk];
      if(w.month!==lastMo){html+=`<div class="${grpCls}">Tháng ${w.month}</div>`;lastMo=w.month}
      html+=`<div class="${itemCls}" data-key="${wk}" ${onclick(wk)}>
        <span class="${tagCls}">W${w.week}</span>
        <span class="${daysCls}">${w.days}n</span>
        <span class="${valCls}">${fM(w.chain.dt)}</span>
      </div>`;
    });
  } else {
    Object.keys(MONTHLY).forEach(mo=>{
      const m=MONTHLY[mo];
      html+=`<div class="${itemCls}" data-key="${mo}" ${onclick(mo)}>
        <span class="${tagCls}">T${mo}</span>
        <span class="${daysCls}">2026</span>
        <span class="${valCls}">${fM(m.chain.dt)}</span>
      </div>`;
    });
  }
  return html;
}

function validCurForMode(){
  if(MODE==='day')   return CUR in DAILY;
  if(MODE==='week')  return CUR in WEEKLY;
  if(MODE==='month') return CUR in MONTHLY;
  return false;
}
function setCurDefault(){
  if(MODE==='day')   CUR=Object.keys(DAILY).sort().pop();
  if(MODE==='week')  CUR=Object.keys(WEEKLY).pop();
  if(MODE==='month') CUR=Object.keys(MONTHLY).pop();
}
function selectItem(key){
  CUR=key;
  highlightSbItem(key);
  render();
}
function highlightSbItem(key){
  document.querySelectorAll('#sb-list .sb-item').forEach(el=>el.classList.toggle('active',el.dataset.key===key));
}
function highlightDrItem(key){
  document.querySelectorAll('#dr-list .dr-item').forEach(el=>el.classList.toggle('active',el.dataset.key===key));
}

/* ── RENDER DISPATCH ── */
function render(){
  destroyCharts();
  if(!validCurForMode()) setCurDefault();
  if(MODE==='day')   renderDay();
  else if(MODE==='week')  renderWeek();
  else               renderMonth();
  highlightSbItem(CUR);
}

function brTable(brData,chainData,extraThs,extraTds){
  const sorted=[...BRANCHES].sort((a,b)=>(brData[b]?.dt||0)-(brData[a]?.dt||0));
  let h=`<div class="tbl-wrap"><table class="bt"><thead><tr>
    <th>Cơ sở</th><th>DT</th><th>Fnet</th><th>FnB</th><th>Mart</th><th>Traffic</th><th>NRU</th>${extraThs||''}
  </tr></thead><tbody>`;
  sorted.forEach((b,i)=>{
    const d=brData[b]||{};
    const v=f=>MODE==='day'?fM(d[f]||0):VIEW==='total'?fM(d[f]||0):fMd(d['avg_'+f]||0);
    const tf=MODE==='day'?fN(d.traffic||0):VIEW==='total'?fN(d.traffic||0):(d.avg_traffic||0).toFixed(0);
    const nr=MODE==='day'?fN(d.nru||0):VIEW==='total'?fN(d.nru||0):(d.avg_nru||0).toFixed(1);
    h+=`<tr>
      <td><span class="dot" style="background:${BR_CLR[b]}"></span>${MEDALS[i].replace('.','')}&nbsp;${b}</td>
      <td style="color:var(--navy);font-weight:500">${v('dt')}</td>
      <td>${v('fnet')}</td><td>${v('fnb')}</td><td>${v('mart')}</td>
      <td>${tf}</td><td>${nr}</td>${extraTds?extraTds(b,d):''}
    </tr>`;
  });
  const c=chainData;
  const cv=f=>MODE==='day'?fM(c[f]||0):VIEW==='total'?fM(c[f]||0):fMd(c['avg_'+f]||0);
  const ctf=MODE==='day'?fN(c.traffic||0):VIEW==='total'?fN(c.traffic||0):(c.avg_traffic||0).toFixed(0);
  const cnr=MODE==='day'?fN(c.nru||0):VIEW==='total'?fN(c.nru||0):(c.avg_nru||0).toFixed(1);
  h+=`<tr class="tr-tot"><td>CHAIN</td><td>${cv('dt')}</td><td>${cv('fnet')}</td><td>${cv('fnb')}</td><td>${cv('mart')}</td><td>${ctf}</td><td>${cnr}</td>${extraThs?'<td></td>':''}</tr>`;
  return h+'</tbody></table></div>';
}
function kpiBars(brData,mo,daysWk){
  return [...BRANCHES].sort((a,b)=>{
    const pA=kpiPct(brData[a],mo,daysWk),pB=kpiPct(brData[b],mo,daysWk);return pB-pA;
  }).map(b=>{
    const p=kpiPct(brData[b],mo,daysWk),bw=Math.min(p*100,115).toFixed(0),clr=pC(p);
    return `<div class="kb-row">
      <div class="kb-n">${b}</div>

      <div class="kb-pct" style="color:${clr}">${fP(p)}</div>
    </div>`;
  }).join('');
}
function kpiPct(bd,mo,daysWk){
  if(!bd)return 0;
  const k=KPI[Object.keys(KPI).find(b=>b===Object.keys(KPI).find(x=>x))]?.[mo];
  // find KPI for this branch
  const brName=BRANCHES.find(b=>bd===bd); // placeholder
  return bd.kpi_pct||0;
}
function chBars(brData,field,color){
  const sorted=[...BRANCHES].sort((a,b)=>(brData[b]?.[field]||0)-(brData[a]?.[field]||0));

  return sorted.map(b=>`<div class="br-row">
    <div class="br-n">${b}</div>
    <div class="br-t"><div class="br-f" style="width:${mx>0?((brData[b]?.[field]||0)/mx*100).toFixed(0):0}%;background:${color}"></div></div>

/* ══ DAY RENDER ══════════════════════════════════════════ */
function renderDay(){
  const d=DAILY[CUR]; if(!d) return;
  const br=d.branches, ch=Object.values(br).reduce((a,b)=>({
    dt:(a.dt||0)+b.dt, fnet:(a.fnet||0)+b.fnet, fnb:(a.fnb||0)+b.fnb,
    mart:(a.mart||0)+b.mart, traffic:(a.traffic||0)+b.traffic, nru:(a.nru||0)+b.nru
  }),{});
  const mo=d.month;
  const dd=new Date(CUR+'T00:00');
  const thus=['Chủ Nhật','Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7'];
  setHeader(`${thus[dd.getDay()]} ${CUR.slice(8)}/${CUR.slice(5,7)}`,`Tháng ${mo} · Tuần ${d.week} · 6 cơ sở`,`${CUR.slice(8)}/${CUR.slice(5,7)}`);

  const days2=Object.keys(DAILY).sort(); const idx=days2.indexOf(CUR);
  const prev=idx>0?DAILY[days2[idx-1]]:null;
  const prevCh=prev?Object.values(prev.branches).reduce((a,b)=>({dt:(a.dt||0)+b.dt}),{}):null;
  const chainKpiDay=Object.values(KPI).reduce((s,bk)=>s+(bk[mo]?.dttb||0),0);
  const chainPct=chainKpiDay>0?ch.dt/chainKpiDay:0;

  const warns=BRANCHES.filter(b=>{const k=KPI[b]?.[mo]?.dttb||0;return k>0&&(br[b]?.dt||0)/k<.8})
    .map(b=>[b,(br[b]?.dt||0)/(KPI[b]?.[mo]?.dttb||1)]);
  setAlert(warns,chainPct);

  setKPIStrip([
    {l:'DT hôm nay',v:fM(ch.dt),s:`KPI <b style="color:${pC(chainPct)}">${fP(chainPct)}</b>`,c:'bl'},
    {l:'Fnet',v:fM(ch.fnet),s:fP(ch.fnet/ch.dt)+' DT',c:'bl'},
    {l:'FnB',v:fM(ch.fnb),s:fP(ch.fnb/ch.dt)+' DT',c:'tl'},
    {l:'Mart',v:fM(ch.mart),s:fP(ch.mart/ch.dt)+' DT',c:'am'},
    {l:'Traffic',v:fN(ch.traffic),s:'Lượt login',c:'pu'},
    {l:'NRU',v:fN(ch.nru),s:'Khách mới',c:'nv'},
  ]);

  const vsPct=prevCh&&prevCh.dt>0?(ch.dt-prevCh.dt)/prevCh.dt:null;
  setInfoBar([
    ['Ngày',`${CUR.slice(8)}/${CUR.slice(5,7)}`],
    ['Tháng',`T${mo}`],['Tuần',`W${d.week}`],
    ['DT hôm nay',fM(ch.dt)],
    ['DT hôm qua',prevCh?fM(prevCh.dt):'—'],
    ['vs H.qua',vsPct!==null?`${vsPct>=0?'+':''}${fP(vsPct)}`:'—',`color:${vsPct>=0?'#0EA47A':'#DC2626'}`],
  ]);

  const mc=document.getElementById('main-content');
  // Row1: table + KPI
  const r1=document.createElement('div');r1.className='g2 mb10';
  r1.innerHTML=mkPanel(mkPt('Doanh thu theo cơ sở','hôm nay vs hôm qua')+
    brTable(br,ch,'<th>vs H.qua</th>',(b,dd2)=>{
      if(!prev)return '<td>—</td>';
      const pbd=prev.branches[b]||{};
      const vs2=pbd.dt>0?(dd2.dt-pbd.dt)/pbd.dt:0;
      return `<td><span class="badge ${vs2>=0?'bup':'bdn'}">${vs2>=0?'+':''}${fP(vs2)}</span></td>`;
    }))+
  mkPanel(mkPt('% KPI ngày','vs DTTB ngày tháng')+
    BRANCHES.map(b=>{const k=KPI[b]?.[mo]?.dttb||0;const p=k>0?(br[b]?.dt||0)/k:0;const bw=Math.min(p*100,115).toFixed(0);const clr=pC(p);
      return `<div class="kb-row"><div class="kb-n">${b}</div><div class="kb-t"><div class="kb-f" style="width:${bw}%;background:${clr}88"></div></div><div class="kb-pct" style="color:${clr}">${fP(p)}</div></div>`;
    }).join('')+
    '<div style="margin-top:12px">'+mkPt('ARPPU','đồng/đơn')+arppu(br)+'</div>');
  mc.innerHTML='';mc.appendChild(r1);

  // Row2: channels
  const r2=document.createElement('div');r2.className='g3 mb10';
  r2.innerHTML=
    mkPanel(`<div class="pt" style="color:var(--blue)">Fnet <span>${fM(ch.fnet)}</span></div>`+chBars(br,'fnet','#1A6FE0'))+
    mkPanel(`<div class="pt" style="color:var(--teal)">FnB <span>${fM(ch.fnb)}</span></div>`+chBars(br,'fnb','#0EA47A'))+
    mkPanel(`<div class="pt" style="color:var(--amber)">Mart <span>${fM(ch.mart)}</span></div>`+chBars(br,'mart','#D97706'));
  mc.appendChild(r2);

  // Row3: 14-day trend
  const r3=document.createElement('div');r3.className='panel mb10';
  const recent=Object.keys(DAILY).sort().slice(-14);
  r3.innerHTML=mkPt('14 ngày gần nhất','stacked DT')+
    `<div class="leg">${BRANCHES.map(b=>`<span><span class="ld" style="background:${BR_CLR[b]}"></span>${b}</span>`).join('')}</div>`+
    `<div class="cw h220"><canvas id="ch-day" role="img" aria-label="14-day trend"></canvas></div>`;
  mc.appendChild(r3);
  CHARTS.day=new Chart(document.getElementById('ch-day'),{type:'bar',
    data:{labels:recent.map(dk=>{const dd2=new Date(dk+'T00:00');return ['CN','T2','T3','T4','T5','T6','T7'][dd2.getDay()]+dk.slice(8)}),
      datasets:BRANCHES.map(b=>({label:b,data:recent.map(dk=>+(DAILY[dk]?.branches[b]?.dt/1e6||0).toFixed(1)),
        backgroundColor:BR_CLR[b]+'AA',borderColor:BR_CLR[b],borderWidth:0,borderRadius:2,stack:'s'}))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.raw+'M'}}},
      scales:{x:{stacked:true,ticks:{color:'#9BA8B5',font:{size:9}},grid:{display:false}},
        y:{stacked:true,ticks:{color:'#9BA8B5',callback:v=>v+'M',font:{size:9}},grid:{color:'#F0F2F6'}}}}});
  renderAnomalyPanel(computeAnomalies('day',CUR));
}

    const p=br[b]?.kpi_pct||0;const bw=Math.min(p*100,115).toFixed(0);const clr=pC(p);
    return `<div class="kb-row">
      <div class="kb-n">${b}</div>
      <div class="kb-t"><div class="kb-f" style="width:${bw}%;background:${clr}88"></div></div>
      <div class="kb-pct" style="color:${clr}">${fP(p)}</div>
    </div>`;
  }).join('');
  r1.innerHTML=mkPanel(mkPt('Doanh thu cơ sở',vl)+brTable(br,c,'',''))+
    mkPanel(mkPt('% KPI tuần','KPI/ngày×ngày tuần')+kpiHtml+'<div style="margin-top:12px">'+mkPt('ARPPU','')+arppu(br)+'</div>');
  mc.appendChild(r1);

  // Row2: channels
  const r2=document.createElement('div');r2.className='g3 mb10';
  const wf=f=>VIEW==='total'?f:'avg_'+f;
  const chBarsW=(field,color)=>{
    const sv=[...BRANCHES].sort((a,b_)=>(br[b_]?.[field]||0)-(br[a]?.[field]||0));
    const mx=Math.max(...BRANCHES.map(b=>br[b]?.[field]||0));
    return sv.map(b=>`<div class="br-row"><div class="br-n">${b}</div><div class="br-t"><div class="br-f" style="width:${mx>0?((br[b]?.[field]||0)/mx*100).toFixed(0):0}%;background:${color}"></div></div><div class="br-v">${fM(br[b]?.[field]||0)}</div></div>`).join('');
  };
  const cv=f=>VIEW==='total'?fM(c[f]||0):fMd(c['avg_'+f]||0)+'/ng';
  r2.innerHTML=
    mkPanel(`<div class="pt" style="color:var(--blue)">Fnet <span>${cv('fnet')}</span></div>`+chBarsW(wf('fnet'),'#1A6FE0'))+
    mkPanel(`<div class="pt" style="color:var(--teal)">FnB <span>${cv('fnb')}</span></div>`+chBarsW(wf('fnb'),'#0EA47A'))+
    mkPanel(`<div class="pt" style="color:var(--amber)">Mart <span>${cv('mart')}</span></div>`+chBarsW(wf('mart'),'#D97706'));
  mc.appendChild(r2);

  // Row3: branch avg/day trend + intra-month compare
  const wkeys=Object.keys(WEEKLY);
  const r3=document.createElement('div');r3.className='g2e mb10';
  r3.innerHTML=
    mkPanel(`<div class="leg">${BRANCHES.map(b=>`<span><span class="ld" style="background:${BR_CLR[b]}"></span>${b}</span>`).join('')}</div>`+
      mkPt('DT TB/ngày tất cả tuần','')+`<div class="cw h200"><canvas id="ch-wk-tr" role="img" aria-label="week trend"></canvas></div>`)+
    mkPanel(mkPt(`So sánh tuần T${mo}`,'TB/ngày ★=đang chọn')+`<div class="cw h200"><canvas id="ch-wk-cmp" role="img" aria-label="week compare"></canvas></div>`);
  mc.appendChild(r3);

  CHARTS.wktr=new Chart(document.getElementById('ch-wk-tr'),{type:'line',
    data:{labels:wkeys.map(k=>`T${WEEKLY[k].month}W${WEEKLY[k].week}
${WEEKLY[k].days}n`),
      datasets:BRANCHES.map(b=>({label:b,data:wkeys.map(k=>+(WEEKLY[k].branches[b]?.avg_dt/1e6||0).toFixed(2)),
        borderColor:BR_CLR[b],backgroundColor:'transparent',borderWidth:1.5,
        pointRadius:wkeys.map(k=>k===CUR?5:2),pointBackgroundColor:wkeys.map(k=>k===CUR?BR_CLR[b]:'transparent'),tension:.3}))},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.raw+'M/ng'}}},
      scales:{x:{ticks:{color:'#9BA8B5',font:{size:8},maxRotation:40},grid:{color:'#F0F2F6'}},y:{ticks:{color:'#9BA8B5',callback:v=>v+'M',font:{size:9}},grid:{color:'#F0F2F6'}}}}});

  const peers=wkeys.filter(k=>WEEKLY[k].month===mo);
  CHARTS.wkcmp=new Chart(document.getElementById('ch-wk-cmp'),{type:'bar',
    data:{labels:peers.map(k=>`W${WEEKLY[k].week}(${WEEKLY[k].days}n)${k===CUR?'★':''}`),
      datasets:BRANCHES.map(b=>({label:b,data:peers.map(k=>+(WEEKLY[k].branches[b]?.avg_dt/1e6||0).toFixed(2)),
        backgroundColor:BR_CLR[b]+'AA',borderColor:BR_CLR[b],borderWidth:1,borderRadius:3}))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{color:'#6B7A8D',font:{size:9},padding:6,usePointStyle:true}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.raw+'M/ng'}}},
      scales:{x:{ticks:{color:'#9BA8B5',font:{size:9}},grid:{display:false}},y:{ticks:{color:'#9BA8B5',callback:v=>v+'M',font:{size:9}},grid:{color:'#F0F2F6'}}}}});
  renderAnomalyPanel(computeAnomalies('week',CUR));
}

/* ══ MONTH RENDER ══════════════════════════════════════════ */
function renderMonth(){
  const m=MONTHLY[CUR];if(!m)return;
  const mo=parseInt(CUR),br=m.branches,c=m.chain;
  const chainKPI=Object.values(KPI).reduce((s,bk)=>s+(bk[mo]?.total||0),0);
  const kpiPct2=chainKPI>0?c.dt/chainKPI:0;
  setHeader(`Tháng ${mo}/2026`,`${fM(c.dt)} doanh thu · ${Object.values(br)[0]?.days||'?'} ngày · 6 cơ sở`,`T${mo}/2026`);

  const warns=BRANCHES.filter(b=>{const k=KPI[b]?.[mo]?.total||0;return k>0&&(br[b]?.dt||0)/k<.8}).map(b=>[b,(br[b]?.dt||0)/(KPI[b]?.[mo]?.total||1)]);
  setAlert(warns,kpiPct2);

  setKPIStrip([
    {l:'DT tháng',v:fM(c.dt),s:`KPI <b style="color:${pC(kpiPct2)}">${fP(kpiPct2)}</b>`,c:'bl'},
    {l:'Fnet',v:fM(c.fnet),s:fP(c.fnet/c.dt)+' DT',c:'bl'},
    {l:'FnB',v:fM(c.fnb),s:fP(c.fnb/c.dt)+' DT',c:'tl'},
    {l:'Mart',v:fM(c.mart),s:fP(c.mart/c.dt)+' DT',c:'am'},
    {l:'Traffic',v:fN(c.traffic),s:'Tổng tháng',c:'pu'},
    {l:'NRU',v:fN(c.nru),s:'Tổng tháng',c:'nv'},
  ]);

  const mdays=Object.values(br)[0]?.days||30;
  setInfoBar([
    ['Tháng',`T${mo}/2026`],['Ngày data',`${mdays}n`],
    ['DT tháng',fM(c.dt)],['KPI tháng',fM(chainKPI)],
    ['% KPI',fP(kpiPct2),`color:${pC(kpiPct2)};font-weight:600`],
    ['DT TB/ngày',fMd(c.avg_dt)],
  ]);

  const mc=document.getElementById('main-content');mc.innerHTML='';

  // Row1: table + KPI
  const r1=document.createElement('div');r1.className='g2 mb10';
  const sorted=[...BRANCHES].sort((a,b_)=>(br[b_]?.dt||0)-(br[a]?.dt||0));
  let moTbody='';
  sorted.forEach((b,i)=>{
    const d=br[b]||{};const k=KPI[b]?.[mo]||{};
    const p=k.total>0?(d.dt||0)/k.total:0;
    moTbody+=`<tr><td><span class="dot" style="background:${BR_CLR[b]}"></span>${MEDALS[i].replace('.','')}&nbsp;${b}</td>
      <td style="color:var(--navy);font-weight:500">${fM(d.dt||0)}</td>
      <td>${fM(d.fnet||0)}</td><td>${fM(d.fnb||0)}</td><td>${fM(d.mart||0)}</td>
      <td>${fMd(d.avg_dt||0)}</td><td><span class="badge ${pBcl(p)}">${fP(p)}</span></td></tr>`;
  });
  moTbody+=`<tr class="tr-tot"><td>CHAIN</td><td>${fM(c.dt)}</td><td>${fM(c.fnet)}</td><td>${fM(c.fnb)}</td><td>${fM(c.mart)}</td><td>${fMd(c.avg_dt)}</td><td><span class="badge ${pBcl(kpiPct2)}">${fP(kpiPct2)}</span></td></tr>`;

  const moKpiHtml=[...BRANCHES].sort((a,b_)=>{
    const pA=KPI[a]?.[mo]?.total>0?(br[a]?.dt||0)/KPI[a][mo].total:0;
    const pB=KPI[b_]?.[mo]?.total>0?(br[b_]?.dt||0)/KPI[b_][mo].total:0;return pB-pA;
  }).map(b=>{
    const k=KPI[b]?.[mo]||{};const p=k.total>0?(br[b]?.dt||0)/k.total:0;
    const bw=Math.min(p*100,115).toFixed(0);const clr=pC(p);
    return `<div class="kb-row"><div class="kb-n">${b}</div><div class="kb-t"><div class="kb-f" style="width:${bw}%;background:${clr}88"></div></div><div class="kb-pct" style="color:${clr}">${fP(p)}</div></div>`;
  }).join('');

  r1.innerHTML=
    mkPanel(mkPt('Doanh thu tháng','tổng & TB/ngày')+
      `<div class="tbl-wrap"><table class="bt">
        <thead><tr><th>Cơ sở</th><th>DT tháng</th><th>Fnet</th><th>FnB</th><th>Mart</th><th>TB/ngày</th><th>% KPI</th></tr></thead>
        <tbody>${moTbody}</tbody>
      </table></div>`)+
    mkPanel(mkPt('% KPI tháng','DT/KPI tháng')+moKpiHtml+
      '<div style="margin-top:12px">'+mkPt('ARPPU','')+arppu(br)+'</div>');
  mc.appendChild(r1);

  // Row2: monthly trend
  const r2=document.createElement('div');r2.className='panel mb10';
  const mos=Object.keys(MONTHLY).sort((a,b)=>+a-+b);
  r2.innerHTML=mkPt('Xu hướng DT theo tháng','tổng tháng (stacked)')+
    `<div class="leg">${BRANCHES.map(b=>`<span><span class="ld" style="background:${BR_CLR[b]}"></span>${b}</span>`).join('')}</div>`+
    `<div class="cw h220"><canvas id="ch-mo" role="img" aria-label="monthly trend"></canvas></div>`;
  mc.appendChild(r2);
  CHARTS.mo=new Chart(document.getElementById('ch-mo'),{type:'bar',
    data:{labels:mos.map(m=>`T${m}`),
      datasets:BRANCHES.map(b=>({label:b,data:mos.map(m=>+((MONTHLY[m].branches[b]?.dt||0)/1e9).toFixed(3)),
        backgroundColor:BR_CLR[b]+(parseInt(CUR)===parseInt(CUR)?'CC':'88'),borderColor:BR_CLR[b],borderWidth:1,borderRadius:3,stack:'s'}))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+': '+(c.raw*1000).toFixed(0)+'M'}}},
      scales:{x:{stacked:true,ticks:{color:'#9BA8B5',font:{size:10}},grid:{display:false}},
        y:{stacked:true,ticks:{color:'#9BA8B5',callback:v=>v+'B',font:{size:9}},grid:{color:'#F0F2F6'}}}}});
}

/* ── STARTUP ── */
if(sessionStorage.getItem('ogc')==='1'){
  startApp();
} else {
  document.getElementById('pw').focus();
}
</script>
