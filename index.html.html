<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>OGC Cyber Hub — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js">
// ── MOBILE FUNCTIONS ────────────────────────────────────────
function isMobile(){ return window.innerWidth <= 860; }

function mobileTab(mode){
  ['day','week','month'].forEach(m=>{
    document.getElementById('mn-'+m)?.classList.toggle('active', m===mode);
    document.getElementById('tab-'+m)?.classList.toggle('active', m===mode);
  });
  document.getElementById('mn-list').classList.remove('active');
  MODE = mode;
  // sync view toggle visibility
  const vt = document.getElementById('view-toggle');
  if(vt) vt.style.display = mode==='day'?'none':'flex';
  // sync drawer toggle
  const mdVt = document.getElementById('md-vt');
  if(mdVt) mdVt.style.display = mode==='day'?'none':'flex';
  // Rebuild sidebar list in drawer
  syncDrawerList();
  render();
}

function mobileToggleView(){
  setView(VIEW==='total'?'avg':'total');
  document.getElementById('mn-view-icon').textContent = VIEW==='total'?'🔢':'📐';
  document.getElementById('mn-view-lbl').textContent  = VIEW==='total'?'Tổng':'TB/ngày';
  document.getElementById('md-btn-tot')?.classList.toggle('active', VIEW==='total');
  document.getElementById('md-btn-avg')?.classList.toggle('active', VIEW==='avg');
}

function mdSetView(v){
  setView(v);
  document.getElementById('mn-view-icon').textContent = v==='total'?'🔢':'📐';
  document.getElementById('mn-view-lbl').textContent  = v==='total'?'Tổng':'TB/ngày';
  document.getElementById('md-btn-tot')?.classList.toggle('active', v==='total');
  document.getElementById('md-btn-avg')?.classList.toggle('active', v==='avg');
}

function toggleDrawer(){
  const d = document.getElementById('mobile-drawer');
  const o = document.getElementById('mobile-overlay');
  const isOpen = d.classList.contains('open');
  if(isOpen){ closeDrawer(); }
  else {
    syncDrawerList();
    d.classList.add('open');
    o.classList.add('show');
    document.getElementById('mn-list').classList.add('active');
  }
}

function closeDrawer(){
  document.getElementById('mobile-drawer').classList.remove('open');
  document.getElementById('mobile-overlay').classList.remove('show');
  document.getElementById('mn-list').classList.remove('active');
}

function syncDrawerList(){
  const mdTitle = document.getElementById('md-title');
  const mdList  = document.getElementById('md-list');
  const mdVt    = document.getElementById('md-vt');
  if(!mdList) return;
  
  const titles = {day:'Chọn ngày', week:'Chọn tuần', month:'Chọn tháng'};
  mdTitle.textContent = titles[MODE];
  mdVt.style.display = MODE==='day'?'none':'flex';

  // Clone sidebar list content into drawer
  const sbList = document.getElementById('sb-list');
  if(sbList){
    mdList.innerHTML = '';
    const clone = sbList.cloneNode(true);
    // Update onclick handlers in clone
    clone.querySelectorAll('.sb-item').forEach(el=>{
      const key = el.dataset.key;
      el.onclick = ()=>{ selectItem(key); closeDrawer(); };
    });
    clone.querySelectorAll('.sb-grp-lbl').forEach(el=>{
      el.style.cssText += 'color:#94a3b8;font-size:11px;padding:8px 8px 4px';
    });
    clone.querySelectorAll('.sb-item').forEach(el=>{
      el.style.cssText += 'padding:8px 10px;border-radius:6px;margin-bottom:2px';
      el.querySelectorAll('.sb-item-tag').forEach(t=>t.style.color='#94a3b8');
      el.querySelectorAll('.sb-item-val').forEach(v=>v.style.color='#93c5fd');
    });
    mdList.appendChild(clone);
  }
}

// Patch selectItem to also close drawer on mobile
const _origSelectItem = selectItem;
window.selectItem = function(key){
  _origSelectItem(key);
  if(isMobile()) closeDrawer();
};

// Wrap tables for mobile scroll after render
const _origRender = render;
window.render = function(){
  _origRender();
  // Wrap any bare .bt tables that aren't in bt-wrap
  if(isMobile()){
    document.querySelectorAll('.bt').forEach(t=>{
      if(!t.parentElement.classList.contains('bt-wrap')){
        const wrap = document.createElement('div');
        wrap.className = 'bt-wrap';
        t.parentNode.insertBefore(wrap, t);
        wrap.appendChild(t);
      }
    });
  }
};

</script>
<style>
:root{--bg:#F3F5F9;--sur:#FFF;--brd:#E4E8F0;--navy:#0D1B2A;--blue:#1A6FE0;--teal:#0EA47A;--amber:#D97706;--red:#DC2626;--purple:#7C3AED;--txt:#0D1B2A;--mut:#6B7A8D;--dim:#9BA8B5;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:13px;min-height:100vh}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:0}
.login-card{background:#111f30;border:1px solid #1e3a52;border-radius:16px;padding:40px 44px;width:340px;text-align:center}
.login-logo{font-size:32px;margin-bottom:16px}
.login-title{font-size:18px;font-weight:600;color:#fff;margin-bottom:4px}
.login-sub{font-size:11px;color:#4B6380;margin-bottom:28px}
.login-input{width:100%;background:#0d1b2a;border:1px solid #1e3a52;border-radius:8px;padding:11px 14px;font-size:14px;color:#fff;font-family:var(--mono);letter-spacing:.1em;outline:none;transition:border-color .2s;text-align:center}
.login-input:focus{border-color:#1A6FE0}
.login-btn{width:100%;margin-top:14px;background:#1A6FE0;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;font-family:var(--font);transition:background .15s}
.login-btn:hover{background:#155ec0}
.login-err{margin-top:10px;font-size:11px;color:#EF4444;min-height:16px}
.login-hint{margin-top:20px;font-size:10px;color:#2a3f55}

/* ── APP ── */
#app{display:none}
.app{display:grid;grid-template-columns:210px 1fr;min-height:100vh}

/* sidebar */
.sb{background:var(--navy);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid #1e3044}
.sb-mark{font-size:14px;font-weight:600;color:#fff;letter-spacing:-.01em}
.sb-sub{font-size:9px;color:#4B6380;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}

/* Mode tabs */
.mode-tabs{display:flex;padding:10px 10px 0;gap:4px}
.mode-tab{flex:1;padding:7px 4px;border-radius:6px;text-align:center;font-size:10px;font-weight:600;cursor:pointer;color:#4B6380;transition:all .15s;border:1px solid transparent}
.mode-tab:hover{background:#1e3044;color:#94a3b8}
.mode-tab.active{background:#1A6FE020;color:#60A5FA;border-color:#1A6FE040}

/* nav items */
.sb-sec{padding:10px 10px 0}
.sb-sec-lbl{font-size:9px;color:#4B6380;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;padding:0 2px}
.sb-grp-lbl{font-size:9px;color:#4B6380;padding:5px 8px 2px;text-transform:uppercase;letter-spacing:.06em}
.sb-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background .12s;border:1px solid transparent;margin-bottom:2px;user-select:none}
.sb-item:hover{background:#1e3044}
.sb-item.active{background:#1A6FE018;border-color:#1A6FE040}
.sb-item-tag{font-family:var(--mono);font-size:10px;font-weight:500;color:#7B94AD;min-width:38px}
.sb-item.active .sb-item-tag{color:#60A5FA}
.sb-item-days{font-size:9px;color:#4B6380;min-width:30px}
.sb-item-val{font-size:9px;color:#6B7A8D;text-align:right;flex:1;font-family:var(--mono)}
.sb-item.active .sb-item-val{color:#93C5FD}
.sb-div{border:none;border-top:1px solid #1e3044;margin:8px 0}
.sb-bottom{padding:10px 12px;margin-top:auto}
.sb-vt{display:flex;background:#0d1b2a;border-radius:6px;padding:2px;gap:1px}
.sb-vt-btn{flex:1;padding:4px 6px;border-radius:5px;font-size:9px;font-weight:600;cursor:pointer;color:#4B6380;text-align:center;transition:all .12s;user-select:none}
.sb-vt-btn.active{background:#1e3044;color:#e2e8f0}
.sb-footer{font-size:9px;color:#4B6380;line-height:1.6;margin-top:8px}
.logout-btn{width:100%;margin-top:10px;background:#1e3044;border:none;border-radius:6px;padding:7px;font-size:10px;color:#4B6380;cursor:pointer;font-family:var(--font);transition:background .12s}
.logout-btn:hover{background:#2a3f55;color:#94a3b8}

/* main */
.main{padding:18px 22px;overflow-x:hidden}
.pg-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.pg-title{font-size:17px;font-weight:600;letter-spacing:-.02em}
.pg-sub{font-size:11px;color:var(--mut);margin-top:2px}
.hdr-pill{background:var(--navy);color:#fff;font-size:10px;font-family:var(--mono);padding:5px 12px;border-radius:20px;white-space:nowrap}

/* info bar */
.info-bar{background:#EEF4FF;border-radius:8px;padding:9px 14px;margin-bottom:12px;display:flex;flex-wrap:wrap;align-items:center;gap:12px}
.ib-item{display:flex;flex-direction:column;gap:1px}
.ib-lbl{font-size:8px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
.ib-val{font-family:var(--mono);font-weight:500;color:var(--navy);font-size:11px}
.ib-sep{width:1px;height:24px;background:var(--brd)}

/* alert */
.alert{padding:8px 14px;margin-bottom:12px;font-size:11px;display:flex;align-items:flex-start;gap:8px;line-height:1.6;border-left:3px solid}
.al-ok{background:#ECFDF5;border-color:#0EA47A;color:#065F46}
.al-warn{background:#FEF9C3;border-color:#D97706;color:#78350F}
.al-bad{background:#FEF2F2;border-color:#DC2626;color:#991B1B}

/* kpi strip */
.kpi-strip{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px;margin-bottom:12px}
.kc{background:var(--sur);border:1px solid var(--brd);border-radius:10px;padding:12px 11px;position:relative;overflow:hidden;animation:fi .2s ease both}
.kc::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:2px 2px 0 0}
.kc.bl::after{background:var(--blue)}.kc.tl::after{background:var(--teal)}.kc.am::after{background:var(--amber)}.kc.pu::after{background:var(--purple)}.kc.rd::after{background:var(--red)}.kc.nv::after{background:var(--navy)}
.kc-lbl{font-size:8px;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.kc-val{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--navy);line-height:1}
.kc-sub{font-size:9px;color:var(--dim);margin-top:4px}

/* grid */
.g2{display:grid;grid-template-columns:1.5fr 1fr;gap:10px;margin-bottom:10px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:10px}
.g2e{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.panel{background:var(--sur);border:1px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:0}
.mb{margin-bottom:10px}
.pt{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.pt span{font-weight:400;text-transform:none;letter-spacing:0;font-size:9px;color:var(--dim)}

/* table */
.bt{width:100%;border-collapse:collapse;font-size:11px}
.bt th{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);padding:4px 6px;text-align:right;border-bottom:1px solid var(--brd)}
.bt th:first-child{text-align:left;padding-left:2px}
.bt td{padding:6px 6px;border-bottom:1px solid #F2F4F8;text-align:right;font-family:var(--mono);font-size:10px;color:var(--mut)}
.bt td:first-child{text-align:left;font-family:var(--font);font-weight:500;color:var(--navy);font-size:11px;padding-left:2px}
.bt tr:last-child td{border-bottom:none}
.bt .tr-tot{font-weight:600;border-top:1.5px solid var(--brd);background:#F7F9FC}
.bt .tr-tot td{color:var(--navy)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px}
.badge{display:inline-block;padding:1px 6px;border-radius:20px;font-size:8px;font-weight:600;font-family:var(--mono)}
.bup{background:#ECFDF5;color:#065F46}.bdn{background:#FEF2F2;color:#991B1B}.bwn{background:#FEF9C3;color:#78350F}

/* bars */
.br{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.br-n{color:var(--mut);flex-shrink:0;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.br-t{flex:1;background:#EEF1F6;border-radius:3px;height:5px;position:relative;overflow:hidden}
.br-f{height:100%;border-radius:3px;position:absolute;left:0;top:0}
.br-v{width:48px;text-align:right;font-family:var(--mono);font-size:9px;color:var(--navy)}

/* kpi bars */
.kbr{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.kbr-n{color:var(--mut);flex-shrink:0;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kbr-t{flex:1;background:#EEF1F6;border-radius:3px;height:7px;position:relative;overflow:hidden}
.kbr-f{height:100%;border-radius:3px;position:absolute;left:0;top:0}
.kbr-pct{width:40px;text-align:right;font-family:var(--mono);font-size:10px;font-weight:500}
.kbr-v{width:52px;text-align:right;font-family:var(--mono);font-size:9px;color:var(--dim)}

/* charts */
.cw{position:relative;width:100%}
.h150{height:150px}.h180{height:180px}.h200{height:200px}.h220{height:220px}.h240{height:240px}

/* legend */
.leg{display:flex;flex-wrap:wrap;gap:8px;font-size:9px;color:var(--mut);margin-bottom:6px}
.ldot{width:7px;height:7px;border-radius:2px;display:inline-block;margin-right:3px}

/* ranking */
.rank-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg);border-radius:7px;margin-bottom:4px}
.rank-med{font-size:14px;width:22px;text-align:center;flex-shrink:0}
.rank-name{flex:1;font-weight:500;font-size:11px}
.rank-val{font-family:var(--mono);font-size:11px;color:var(--mut)}
.rank-badge{font-size:9px;font-weight:600;font-family:var(--mono);padding:1px 6px;border-radius:10px;margin-left:4px}

@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.panel{animation:fi .2s ease both}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}

/* ── MOBILE BOTTOM NAV ── */
#mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:1px solid #1e3044;z-index:1000;padding:0}
.mn-tabs{display:flex;height:52px}
.mn-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:#4B6380;transition:color .15s;border:none;background:none;font-family:var(--font);padding:6px 0}
.mn-tab.active{color:#60A5FA}
.mn-tab-icon{font-size:18px;line-height:1}
.mn-tab-lbl{font-size:9px;font-weight:600;letter-spacing:.04em}

/* Mobile drawer */
#mobile-drawer{display:none;position:fixed;top:0;left:0;right:0;bottom:52px;background:var(--navy);z-index:999;overflow-y:auto;transform:translateX(-100%);transition:transform .25s ease}
#mobile-drawer.open{transform:translateX(0)}
.md-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;border-bottom:1px solid #1e3044}
.md-title{font-size:13px;font-weight:600;color:#fff}
.md-close{background:none;border:none;color:#4B6380;font-size:22px;cursor:pointer;padding:0 4px;line-height:1}
.md-vt{display:flex;background:#0d1b2a;border-radius:6px;padding:2px;gap:1px;margin:10px 16px 0}
.md-vt-btn{flex:1;padding:6px 8px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;color:#4B6380;text-align:center;transition:all .12s;user-select:none}
.md-vt-btn.active{background:#1e3044;color:#e2e8f0}

/* Mobile overlay */
#mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:998}
#mobile-overlay.show{display:block}

@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .sb{display:none}
  #mobile-nav{display:block}
  #mobile-drawer{display:block}
  .main{padding:12px 12px 68px}
  .kpi-strip{grid-template-columns:repeat(3,1fr);gap:6px}
  .g2,.g3,.g2e{grid-template-columns:1fr}
  .panel{padding:12px}
  .pg-title{font-size:15px}
  .kc-val{font-size:15px}
  .bt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .bt{min-width:500px;font-size:10px}
  .bt th,.bt td{padding:5px 6px}
  .info-bar{gap:6px;padding:8px 10px;flex-wrap:wrap}
  .ib-sep{display:none}
  .ib-item{min-width:64px}
  .pg-hdr{margin-bottom:8px}
  .hdr-pill{font-size:9px;padding:4px 10px}
  .alert{font-size:10px;padding:7px 12px}
  .kc-lbl{font-size:7px}
  .kc-sub{font-size:8px}
  .kc{padding:10px 9px}
  .pt{font-size:8px}
  .h220,.h230,.h240{height:180px}
  .h200,.h210{height:160px}
  .h150,.h180{height:140px}
  .login-card{width:90%;padding:28px 24px}
}
@media print{body{background:#fff}.sb{display:none}.main{padding:6px}#login-screen{display:none!important}}

/* Mobile drawer item styles */
#mobile-drawer .sb-grp-lbl{color:#94A3B8 !important;font-size:11px;padding:8px 10px 4px}
#mobile-drawer .sb-item{padding:8px 10px;border-radius:6px;margin-bottom:3px;border-color:#1e3044}
#mobile-drawer .sb-item:hover{background:#1e3044}
#mobile-drawer .sb-item.active{background:#1A6FE018;border-color:#1A6FE040}
#mobile-drawer .sb-item-tag{color:#94A3B8;font-size:10px}
#mobile-drawer .sb-item.active .sb-item-tag{color:#60A5FA}
#mobile-drawer .sb-item-days{color:#4B6380;font-size:9px}
#mobile-drawer .sb-item-val{color:#6B7A8D;font-size:10px}
#mobile-drawer .sb-item.active .sb-item-val{color:#93C5FD}
#mobile-drawer .sb-div{border-color:#1e3044}
</style>
</head>
<body>

<!-- ══ LOGIN ════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🎮</div>
    <div class="login-title">OGC Cyber Hub</div>
    <div class="login-sub">Dashboard Nội bộ — Nhập mật khẩu để tiếp tục</div>
    <input class="login-input" type="password" id="pw-input" placeholder="••••••••" maxlength="20"
           onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Đăng nhập</button>
    <div class="login-err" id="login-err"></div>
    <div class="login-hint">OGC Operations · Confidential</div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════ -->
<div id="app">
<div class="app">

<!-- sidebar -->
<aside class="sb">
  <div class="sb-logo">
    <div class="sb-mark">🎮 OGC / OCH</div>
    <div class="sb-sub">Operations Dashboard</div>
  </div>

  <div class="mode-tabs">
    <div class="mode-tab active" id="tab-day"   onclick="setMode('day')">Ngày</div>
    <div class="mode-tab"       id="tab-week"  onclick="setMode('week')">Tuần</div>
    <div class="mode-tab"       id="tab-month" onclick="setMode('month')">Tháng</div>
  </div>

  <div class="sb-sec">
    <div class="sb-sec-lbl" id="sb-sec-label">Chọn ngày</div>
    <div id="sb-list"></div>
  </div>

  <hr class="sb-div">
  <div class="sb-bottom">
    <div class="sb-sec-lbl" style="margin-bottom:5px">Hiển thị</div>
    <div class="sb-vt" id="view-toggle">
      <div class="sb-vt-btn active" id="btn-tot" onclick="setView('total')">Tổng</div>
      <div class="sb-vt-btn" id="btn-avg" onclick="setView('avg')">TB/ngày</div>
    </div>
    <div class="sb-footer" style="margin-top:8px">
      Quy ước tuần: T2→CN<br>
      KPI tuần = KPI tháng / ngày × ngày tuần<br>
      Dữ liệu: T1–T4/2026
    </div>
    <button class="logout-btn" onclick="doLogout()">🔒 Đăng xuất</button>
  </div>
</aside>

<!-- main -->
<main class="main" id="main-area">
  <div class="pg-hdr">
    <div>
      <div class="pg-title" id="hdr-title">Dashboard</div>
      <div class="pg-sub" id="hdr-sub">Đang tải...</div>
    </div>

// ── Auth ──
const CORRECT_PW = 'oeg2026';
function hashPw(s){ let h=0; for(let i=0;i<s.length;i++) h=(h<<5)-h+s.charCodeAt(i)|0; return h; }
const PW_H = hashPw(CORRECT_PW);

function doLogin(){
  const pw = document.getElementById('pw-input').value;
  if(hashPw(pw) === PW_H){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    sessionStorage.setItem('ogc_auth','1');
    init();
  } else {
    const err = document.getElementById('login-err');
    err.textContent = '❌ Mật khẩu không đúng';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
    setTimeout(()=>err.textContent='',3000);
  }
}
function doLogout(){
  sessionStorage.removeItem('ogc_auth');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('pw-input').value='';
}
if(sessionStorage.getItem('ogc_auth')==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
}

// ── State ──
let MODE='day', VIEW='total', CUR='', CHARTS={};

// ── Helpers ──
const fM   = n=>n==null?'—':n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(1)+'M':Math.round(n).toLocaleString();
const fMd  = n=>(n/1e6).toFixed(2)+'M';
const fN   = n=>Math.round(n).toLocaleString('vi-VN');
const fP   = p=>(p*100).toFixed(1)+'%';
const fK   = n=>n>=1e6?fM(n):n>=1e3?(n/1e3).toFixed(0)+'K':Math.round(n).toString();
const pC   = p=>p>=1?'#0EA47A':p>=.8?'#D97706':'#DC2626';
const pBcl = p=>p>=1?'bup':p>=.8?'bwn':'bdn';
function gv(bd,f){ return VIEW==='total'?(bd[f]||0):(bd['avg_'+f]||bd[f]||0); }
function vl(){ return VIEW==='total'?'Tổng':'TB/ngày'; }
function vfmt(v,is_avg){ return is_avg?fMd(v)+'/ngày':fM(v); }
function dfmt(v){ return VIEW==='total'?fM(v):fMd(v)+'/ngày'; }
function destroyCharts(){ Object.values(CHARTS).forEach(c=>{try{c.destroy()}catch(e){}}); CHARTS={}; }

// ── Mode / View toggles ──
function setMode(m){
  MODE=m;
  ['day','week','month'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('active',x===m));
  // Hide avg toggle for month (not needed)
  document.getElementById('view-toggle').style.display = m==='day'?'none':'flex';
  buildSidebar();
}
function setView(v){
  VIEW=v;
  document.getElementById('btn-tot').classList.toggle('active',v==='total');
  document.getElementById('btn-avg').classList.toggle('active',v==='avg');
  render();
}

// ── Sidebar ──
function buildSidebar(){
  const list=document.getElementById('sb-list');
  list.innerHTML='';
  CUR='';

  if(MODE==='day'){
    document.getElementById('sb-sec-label').textContent='Chọn ngày';
    const days=Object.keys(DAILY).sort().reverse();
    let lastMo=null;
    days.forEach(dk=>{
      const d=DAILY[dk];
      if(d.month!==lastMo){
        const lbl=document.createElement('div');
        lbl.className='sb-grp-lbl';
        lbl.textContent=`Tháng ${d.month}`;
        list.appendChild(lbl);
        lastMo=d.month;
      }
      const c=Object.values(d.branches).reduce((a,b)=>({dt:(a.dt||0)+b.dt}),{});
      const el=document.createElement('div');
      el.className='sb-item';
      el.dataset.key=dk;
      const dd=new Date(dk+'T00:00:00');
      const thus=['CN','T2','T3','T4','T5','T6','T7'];
      el.innerHTML=`<span class="sb-item-tag">${thus[dd.getDay()]} ${dk.slice(8)}</span><span class="sb-item-days">W${d.week}</span><span class="sb-item-val">${fM(c.dt)}</span>`;
      el.onclick=()=>selectItem(dk);
      list.appendChild(el);
      if(!CUR){ CUR=dk; el.classList.add('active'); }
    });

  } else if(MODE==='week'){
    document.getElementById('sb-sec-label').textContent='Chọn tuần';
    let lastMo=null;
    Object.keys(WEEKLY).forEach(wk=>{
      const w=WEEKLY[wk];
      if(w.month!==lastMo){
        const lbl=document.createElement('div');
        lbl.className='sb-grp-lbl';
        lbl.textContent=`Tháng ${w.month}`;
        list.appendChild(lbl);
        lastMo=w.month;
      }
      const el=document.createElement('div');
      el.className='sb-item';
      el.dataset.key=wk;
      el.innerHTML=`<span class="sb-item-tag">W${w.week}</span><span class="sb-item-days">${w.days}n</span><span class="sb-item-val">${fM(w.chain.dt)}</span>`;
      el.onclick=()=>selectItem(wk);
      list.appendChild(el);
      if(!CUR){ CUR=wk; el.classList.add('active'); }
    });
    // Select latest
    const lastWk=Object.keys(WEEKLY).pop();
    CUR=lastWk;
    list.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('active',el.dataset.key===lastWk));

  } else {
    document.getElementById('sb-sec-label').textContent='Chọn tháng';
    Object.keys(MONTHLY).forEach(mo=>{
      const m=MONTHLY[mo];
      const el=document.createElement('div');
      el.className='sb-item';
      el.dataset.key=mo;
      el.innerHTML=`<span class="sb-item-tag">T${mo}</span><span class="sb-item-days">${m.chain.dt>=1e9?(m.chain.dt/1e9).toFixed(1)+'B':fM(m.chain.dt)}</span>`;
      el.onclick=()=>selectItem(mo);
      list.appendChild(el);
      if(!CUR){ CUR=mo; el.classList.add('active'); }
    });
    const lastMo=Object.keys(MONTHLY).pop();
    CUR=lastMo;
    list.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('active',el.dataset.key===lastMo));
  }
  render();
}

function selectItem(key){
  CUR=key;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('active',el.dataset.key===key));
  render();
}

function render(){
  destroyCharts();
  if(MODE==='day')   renderDay();
  else if(MODE==='week') renderWeek();
  else               renderMonth();
}

// ── Common: render branch table ──
function branchTableHTML(branchData, chainData, extraCols){
  const sorted=[...BRANCHES].sort((a,b)=>(branchData[b]?.dt||0)-(branchData[a]?.dt||0));
  let html='<div class="bt-wrap"><table class="bt"><thead><tr><th>Cơ sở</th><th>DT</th><th>Fnet</th><th>FnB</th><th>Mart</th><th>Traffic</th><th>NRU</th>'+(extraCols||'')+'</tr></thead><tbody>';
  sorted.forEach((b,i)=>{
    const d=branchData[b]||{};
    const dt=MODE==='day'?fM(d.dt):VIEW==='total'?fM(d.dt):fMd(d.avg_dt);
    const fn=MODE==='day'?fM(d.fnet):VIEW==='total'?fM(d.fnet):fMd(d.avg_fnet);
    const fb=MODE==='day'?fM(d.fnb):VIEW==='total'?fM(d.fnb):fMd(d.avg_fnb);
    const mt=MODE==='day'?fM(d.mart):VIEW==='total'?fM(d.mart):fMd(d.avg_mart);
    const tf=MODE==='day'?fN(d.traffic):VIEW==='total'?fN(d.traffic):d.avg_traffic?.toFixed(0)||0;
    const nr=MODE==='day'?fN(d.nru):VIEW==='total'?fN(d.nru):d.avg_nru?.toFixed(1)||0;
    html+=`<tr><td><span class="dot" style="background:${BR_CLR[b]}"></span>${MEDALS[i].replace('.','')}&nbsp;${b}</td><td style="color:var(--navy);font-weight:500">${dt}</td><td>${fn}</td><td>${fb}</td><td>${mt}</td><td>${tf}</td><td>${nr}</td>`;
    if(extraCols) html+=extraCols.replace('%%','');
    html+='</tr>';
  });
  // total row
  const cdt=MODE==='day'?fM(chainData.dt):VIEW==='total'?fM(chainData.dt):fMd(chainData.avg_dt);
  html+=`<tr class="tr-tot"><td>CHAIN</td><td>${cdt}</td><td>${MODE==='day'?fM(chainData.fnet):VIEW==='total'?fM(chainData.fnet):fMd(chainData.avg_fnet)}</td><td>${MODE==='day'?fM(chainData.fnb):VIEW==='total'?fM(chainData.fnb):fMd(chainData.avg_fnb)}</td><td>${MODE==='day'?fM(chainData.mart):VIEW==='total'?fM(chainData.mart):fMd(chainData.avg_mart)}</td><td>${MODE==='day'?fN(chainData.traffic):VIEW==='total'?fN(chainData.traffic):(chainData.avg_traffic||0).toFixed(0)}</td><td>${MODE==='day'?fN(chainData.nru):VIEW==='total'?fN(chainData.nru):(chainData.avg_nru||0).toFixed(1)}</td></tr>`;
  html+='</tbody></table></div>';
  return html;
}

// ── Channel bars ──
function chBarsHTML(branchData, field, color, nameWidth='88px'){
  const sorted=[...BRANCHES].sort((a,b)=>(branchData[b]?.[field]||0)-(branchData[a]?.[field]||0));
  const maxV=Math.max(...BRANCHES.map(b=>branchData[b]?.[field]||0));
  return sorted.map(b=>{
    const v=branchData[b]?.[field]||0;
    return `<div class="br"><div class="br-n" style="width:${nameWidth}">${b}</div><div class="br-t"><div class="br-f" style="width:${maxV>0?(v/maxV*100).toFixed(0):0}%;background:${color}"></div></div><div class="br-v">${fM(v)}</div></div>`;
  }).join('');
}

// ── KPI bars ──
function kpiBarHTML(branchData, kpiData, mo, days_wk){
  return [...BRANCHES].sort((a,b)=>{
    const kA=kpiData?.[a]?.[mo]||{}; const kB=kpiData?.[b]?.[mo]||{};
    const kwA=days_wk?kA.total/kA.days*days_wk:kA.dttb;
    const kwB=days_wk?kB.total/kB.days*days_wk:kB.dttb;
    const pA=(branchData[a]?.dt||0)/(kwA||1);
    const pB=(branchData[b]?.dt||0)/(kwB||1);
    return pB-pA;
  }).map(b=>{
    const k=kpiData?.[b]?.[mo]||{};
    const kw=days_wk?(k.total||0)/(k.days||30)*days_wk:(k.dttb||0);
    const p=(branchData[b]?.dt||0)/(kw||1);
    const bw=Math.min(p*100,120).toFixed(0);
    const clr=pC(p);
    return `<div class="kbr"><div class="kbr-n" style="width:95px">${b}</div><div class="kbr-t"><div class="kbr-f" style="width:${bw}%;background:${clr}88"></div></div><div class="kbr-pct" style="color:${clr}">${fP(p)}</div><div class="kbr-v">${fM(branchData[b]?.dt||0)}/${fM(kw)}</div></div>`;
  }).join('');
}

// ── KPI strip ──
function renderKPIStrip(lbl, dt, fnet, fnb, mart, traffic, nru, kpi_pct){
  const pct_c=pC(kpi_pct);
  document.getElementById('kpi-strip').innerHTML=[
    {l:`DT (${lbl})`,v:fM(dt),s:`KPI <span style="color:${pct_c};font-weight:600">${fP(kpi_pct)}</span>`,cl:'bl'},
    {l:`Fnet (${lbl})`,v:fM(fnet),s:fP(fnet/dt)+' DT',cl:'bl'},
    {l:`FnB (${lbl})`,v:fM(fnb),s:fP(fnb/dt)+' DT',cl:'tl'},
    {l:`Mart (${lbl})`,v:fM(mart),s:fP(mart/dt)+' DT',cl:'am'},
    {l:`Traffic (${lbl})`,v:fN(traffic),s:'Lượt login',cl:'pu'},
    {l:`NRU (${lbl})`,v:fN(nru),s:'Khách mới',cl:'nv'},
  ].map((x,i)=>`<div class="kc ${x.cl}" style="animation-delay:${i*0.04}s"><div class="kc-lbl">${x.l}</div><div class="kc-val">${x.v}</div><div class="kc-sub">${x.s}</div></div>`).join('');

// ── Alert bar ──
function renderAlert(warns, chainPct){
  const bar=document.getElementById('alert-bar');
  bar.style.display='flex';
  if(warns.length===0){
    bar.className='alert al-ok';
    bar.innerHTML=`✅ Tất cả cơ sở trong ngưỡng an toàn &nbsp;·&nbsp; Chain ${fP(chainPct)}`;

    bar.innerHTML='⚠️ Dưới 80% KPI: '+warns.map(([b,p])=>`<strong>${b}</strong> ${fP(p)}`).join(' · ');

    return k>0?c.dt/k:0;
  })();

    const k=KPI[b]?.[mo]?.dttb||0;

  }).map(b=>{const k=KPI[b]?.[mo]?.dttb||0;return [b,(br[b]?.dt||0)/k];});

    const el=document.getElementById('vs-prev');
    el.textContent=(vs>=0?'+':'')+fP(vs);

  const mc=document.getElementById('main-content');

  mc.appendChild(row1);

  // Branch table with vs yesterday
  const sorted=[...BRANCHES].sort((a,b_)=>(br[b_]?.dt||0)-(br[a]?.dt||0));
  document.getElementById('day-br-tbody').innerHTML=sorted.map((b,i)=>{
    const d2=br[b]||{};
    const prevBr=prev?.branches[b]||null;
    let vsBadge='';
    if(prevBr){
      const vs2=(d2.dt-prevBr.dt)/prevBr.dt;
      vsBadge=`<span class="badge ${vs2>=0?'bup':'bdn'}">${vs2>=0?'+':''}${fP(vs2)}</span>`;

    return `<tr><td><span class="dot" style="background:${BR_CLR[b]}"></span>${MEDALS[i].replace('.','')}&nbsp;${b}</td>
      <td style="color:var(--navy);font-weight:500">${fM(d2.dt)}</td>

      <td>${fN(d2.traffic)}</td><td>${fN(d2.nru)}</td><td>${vsBadge}</td></tr>`;
  }).join('')+`<tr class="tr-tot"><td>CHAIN</td><td>${fM(c.dt)}</td><td>${fM(c.fnet)}</td><td>${fM(c.fnb)}</td><td>${fM(c.mart)}</td><td>${fN(c.traffic)}</td><td>${fN(c.nru)}</td><td></td></tr>`;

  document.getElementById('day-kpi-bars').innerHTML=kpiBarHTML(br,KPI,mo,null);
  document.getElementById('day-arppu').innerHTML=

  // Row 2: channels
  const row2=document.createElement('div');
  row2.className='g3 mb';
  row2.innerHTML=`
    <div class="panel"><div class="pt" style="color:var(--blue)">Fnet <span>${fM(c.fnet)}</span></div><div id="d-fnet"></div></div>
    <div class="panel"><div class="pt" style="color:var(--teal)">FnB <span>${fM(c.fnb)}</span></div><div id="d-fnb"></div></div>
    <div class="panel"><div class="pt" style="color:var(--amber)">Mart <span>${fM(c.mart)}</span></div><div id="d-mart"></div></div>`;
  mc.appendChild(row2);
  document.getElementById('d-fnet').innerHTML=chBarsHTML(br,'fnet','#1A6FE0');
  document.getElementById('d-fnb').innerHTML=chBarsHTML(br,'fnb','#0EA47A');
  document.getElementById('d-mart').innerHTML=chBarsHTML(br,'mart','#D97706');

  // Row 3: 14-day trend
  const row3=document.createElement('div');
  row3.className='panel mb';
  row3.innerHTML=`<div class="pt">DT 14 ngày gần nhất <span>highlight ngày đang chọn</span></div><div class="leg" id="d-leg"></div><div class="cw h220"><canvas id="d-trend" role="img" aria-label="14-day daily trend"></canvas></div>`;
  mc.appendChild(row3);

  const recent14=Object.keys(DAILY).sort().slice(-14);
  const dLbls=recent14.map(dk=>{const dd2=new Date(dk+'T00:00:00');const t=['CN','T2','T3','T4','T5','T6','T7'];return t[dd2.getDay()]+dk.slice(8)});
  document.getElementById('d-leg').innerHTML=BRANCHES.map(b=>`<span><span class="ldot" style="background:${BR_CLR[b]}"></span>${b}</span>`).join('');
  CHARTS.dtrend=new Chart(document.getElementById('d-trend'),{type:'bar',
    data:{labels:dLbls,datasets:[
      ...BRANCHES.map(b=>({label:b,data:recent14.map(dk=>+(DAILY[dk]?.branches[b]?.dt/1e6||0).toFixed(1)),backgroundColor:BR_CLR[b]+'AA',borderColor:BR_CLR[b],borderWidth:1,borderRadius:2,stack:'s'})),
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.raw+'M'}}},
      scales:{x:{stacked:true,ticks:{color:'#9BA8B5',font:{size:9}},grid:{display:false}},y:{stacked:true,ticks:{color:'#9BA8B5',callback:v=>v+'M',font:{size:9}},grid:{color:'#F0F2F6'}}}}});
}

function renderMonth(){
  const m=MONTHLY[CUR]; if(!m) return;
  const mo=parseInt(CUR), br=m.branches, c=m.chain;

  document.getElementById('hdr-title').textContent=`Dashboard Tháng ${mo}/2026`;
  document.getElementById('hdr-sub').textContent=`${c.dt>=1e9?(c.dt/1e9).toFixed(2)+'B':fM(c.dt)} doanh thu · ${c.days||'?'} ngày hoạt động · 6 cơ sở`;
  document.getElementById('hdr-pill').textContent=`Tháng ${mo}/2026`;

  const chainKPI=Object.values(KPI).reduce((s,bk)=>s+(bk[mo]?.total||0),0);
  const kpiPct=chainKPI>0?c.dt/chainKPI:0;
  const warns=BRANCHES.filter(b=>{
    const bk=KPI[b]?.[mo]||{};
    return bk.total>0 && (br[b]?.dt||0)/bk.total < 0.8;
  }).map(b=>[b,(br[b]?.dt||0)/(KPI[b]?.[mo]?.total||1)]);
  renderAlert(warns,kpiPct);

  renderKPIStrip('tháng',c.dt,c.fnet,c.fnb,c.mart,c.traffic,c.nru,kpiPct);

  const monthDays=Object.values(br)[0]?.days||0;
  document.getElementById('info-bar').innerHTML=`
    <div class="ib-item"><div class="ib-lbl">Tháng</div><div class="ib-val">T${mo}/2026</div></div>
    <div class="ib-sep"></div>
    <div class="ib-item"><div class="ib-lbl">Ngày có data</div><div class="ib-val">${monthDays} ngày</div></div>
    <div class="ib-sep"></div>
    <div class="ib-item"><div class="ib-lbl">DT tháng</div><div class="ib-val">${c.dt>=1e9?(c.dt/1e9).toFixed(2)+'B':fM(c.dt)}</div></div>
    <div class="ib-sep"></div>
    <div class="ib-item"><div class="ib-lbl">KPI tháng</div><div class="ib-val">${chainKPI>=1e9?(chainKPI/1e9).toFixed(2)+'B':fM(chainKPI)}</div></div>
    <div class="ib-sep"></div>
    <div class="ib-item"><div class="ib-lbl">% KPI</div><div class="ib-val" style="color:${pC(kpiPct)}">${fP(kpiPct)}</div></div>
    <div class="ib-sep"></div>
    <div class="ib-item"><div class="ib-lbl">DT TB/ngày</div><div class="ib-val">${fMd(c.avg_dt)}</div></div>`;

  const mc=document.getElementById('main-content');
  mc.innerHTML='';

  // Table + KPI
  const r1=document.createElement('div');
  r1.className='g2 mb';
  r1.innerHTML=`
    <div class="panel"><div class="pt">Doanh thu theo cơ sở <span>tổng tháng & TB/ngày</span></div>
      <div class="bt-wrap"><table class="bt"><thead><tr><th>Cơ sở</th><th>DT tháng</th><th>Fnet</th><th>FnB</th><th>Mart</th><th>TB/ngày</th><th>% KPI</th></tr></thead>
      <tbody id="mo-tbody"></tbody></table></div>
    </div>
    <div class="panel"><div class="pt">% KPI tháng <span>DT thực / KPI tháng</span></div><div id="mo-kpi"></div>
      <div style="margin-top:12px"><div class="pt" style="margin-bottom:5px">DT TB/ngày theo kênh</div><div id="mo-avg-ch"></div></div>
    </div>`;
  mc.appendChild(r1);

  const sorted=[...BRANCHES].sort((a,b_)=>(br[b_]?.dt||0)-(br[a]?.dt||0));
  document.getElementById('mo-tbody').innerHTML=sorted.map((b,i)=>{
    const d=br[b]||{};
    const kpi=KPI[b]?.[mo]||{};
    const kpiPctB=kpi.total>0?(d.dt||0)/kpi.total:0;

  // KPI bars
  document.getElementById('mo-kpi').innerHTML=[...BRANCHES].sort((a,b_)=>{
    const pA=(br[a]?.dt||0)/(KPI[a]?.[mo]?.total||1);
    const pB=(br[b_]?.dt||0)/(KPI[b_]?.[mo]?.total||1);
    return pB-pA;
  }).map(b=>{
    const k=KPI[b]?.[mo]||{};
    const p=(br[b]?.dt||0)/(k.total||1);
    const bw=Math.min(p*100,115).toFixed(0);
    const clr=pC(p);
    return `<div class="kbr"><div class="kbr-n" style="width:95px">${b}</div><div class="kbr-t"><div class="kbr-f" style="width:${bw}%;background:${clr}88"></div></div><div class="kbr-pct" style="color:${clr}">${fP(p)}</div><div class="kbr-v">${fM(br[b]?.dt||0)}/${fM(k.total||0)}</div></div>`;
  }).join('');

  // Avg daily channel
  document.getElementById('mo-avg-ch').innerHTML=['fnet','fnb','mart'].map((f,fi)=>{
    const colors=['#1A6FE0','#0EA47A','#D97706'];
    const names=['Fnet','FnB','Mart'];
    const sv=[...BRANCHES].sort((a,b_)=>(br[b_]?.['avg_'+f]||0)-(br[a]?.['avg_'+f]||0));
    const mx=Math.max(...BRANCHES.map(b=>br[b]?.['avg_'+f]||0));
    return `<div style="font-size:9px;color:${colors[fi]};font-weight:600;margin:6px 0 4px">${names[fi]}</div>`+
      sv.map(b=>`<div class="br"><div class="br-n" style="width:88px">${b}</div><div class="br-t"><div class="br-f" style="width:${mx>0?((br[b]?.['avg_'+f]||0)/mx*100).toFixed(0):0}%;background:${colors[fi]}"></div></div><div class="br-v">${fMd(br[b]?.['avg_'+f]||0)}</div></div>`).join('');
  }).join('');

  // Monthly trend chart
  const r2=document.createElement('div');
  r2.className='panel mb';
  r2.innerHTML=`<div class="pt">Xu hướng DT theo tháng — tất cả cơ sở <span>tổng tháng (tỷ)</span></div><div class="leg" id="mo-leg"></div><div class="cw h220"><canvas id="mo-trend" role="img" aria-label="Monthly trend"></canvas></div>`;
  mc.appendChild(r2);

  const mos=Object.keys(MONTHLY).sort((a,b)=>+a-+b);
  document.getElementById('mo-leg').innerHTML=BRANCHES.map(b=>`<span><span class="ldot" style="background:${BR_CLR[b]}"></span>${b}</span>`).join('');
  CHARTS.motrend=new Chart(document.getElementById('mo-trend'),{type:'bar',
    data:{labels:mos.map(m=>`T${m}`),
      datasets:BRANCHES.map(b=>({label:b,
        data:mos.map(m=>+((MONTHLY[m].branches[b]?.dt||0)/1e9).toFixed(3)),
        backgroundColor:BR_CLR[b]+(mo===parseInt(CUR)?'DD':'88'),
        borderColor:BR_CLR[b],borderWidth:1,borderRadius:3,stack:'s'}))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+': '+(c.raw*1000).toFixed(0)+'M'}}},
      scales:{x:{stacked:true,ticks:{color:'#9BA8B5',font:{size:10}},grid:{display:false}},y:{stacked:true,ticks:{color:'#9BA8B5',callback:v=>v+'B',font:{size:9}},grid:{color:'#F0F2F6'}}}}});

  // KPI attainment donut per branch
  const r3=document.createElement('div');
  r3.className='g3 mb';
  const donutIds=BRANCHES.map((b,i)=>`mo-donut-${i}`);
  r3.innerHTML=BRANCHES.map((b,i)=>{
    const k=KPI[b]?.[mo]||{};
    const p=(br[b]?.dt||0)/(k.total||1);
    return `<div class="panel" style="text-align:center">
      <div class="pt" style="justify-content:center">${b} <span>${fP(p)}</span></div>
      <div class="cw h150"><canvas id="${donutIds[i]}" role="img" aria-label="${b} KPI ${fP(p)}"></canvas></div>
    </div>`;
  }).join('');
  mc.appendChild(r3);
  BRANCHES.forEach((b,i)=>{
    const k=KPI[b]?.[mo]||{};
    const p=Math.min((br[b]?.dt||0)/(k.total||1),1.5);
    const clr=pC(p);
    CHARTS['do'+i]=new Chart(document.getElementById(donutIds[i]),{type:'doughnut',
      data:{labels:['Đạt','Còn lại'],datasets:[{data:[Math.min(p,1),(1-Math.min(p,1))],backgroundColor:[clr+'CC','#EEF1F6'],borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'70%',animation:{duration:600},
        plugins:{legend:{display:false},tooltip:{enabled:false}}}});
  });
}

// ════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════
function init(){
  document.getElementById('view-toggle').style.display='none'; // day mode default, no toggle
  setMode('day');
}

// Auto-login check on page load
if(sessionStorage.getItem('ogc_auth')==='1') init();
document.getElementById('pw-input').addEventListener('keydown',function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('pw-input').focus();

// ── MOBILE FUNCTIONS ────────────────────────────────────────
function isMobile(){ return window.innerWidth <= 860; }

function mobileTab(mode){
  ['day','week','month'].forEach(m=>{
    document.getElementById('mn-'+m)?.classList.toggle('active', m===mode);
    document.getElementById('tab-'+m)?.classList.toggle('active', m===mode);
  });
  document.getElementById('mn-list').classList.remove('active');
  MODE = mode;
  // sync view toggle visibility
  const vt = document.getElementById('view-toggle');
  if(vt) vt.style.display = mode==='day'?'none':'flex';
  // sync drawer toggle
  const mdVt = document.getElementById('md-vt');
  if(mdVt) mdVt.style.display = mode==='day'?'none':'flex';
  // Rebuild sidebar list in drawer
  syncDrawerList();
  render();
}

function mobileToggleView(){
  setView(VIEW==='total'?'avg':'total');
  document.getElementById('mn-view-icon').textContent = VIEW==='total'?'🔢':'📐';
  document.getElementById('mn-view-lbl').textContent  = VIEW==='total'?'Tổng':'TB/ngày';
  document.getElementById('md-btn-tot')?.classList.toggle('active', VIEW==='total');
  document.getElementById('md-btn-avg')?.classList.toggle('active', VIEW==='avg');
}

function mdSetView(v){
  setView(v);
  document.getElementById('mn-view-icon').textContent = v==='total'?'🔢':'📐';
  document.getElementById('mn-view-lbl').textContent  = v==='total'?'Tổng':'TB/ngày';
  document.getElementById('md-btn-tot')?.classList.toggle('active', v==='total');
  document.getElementById('md-btn-avg')?.classList.toggle('active', v==='avg');
}

function toggleDrawer(){
  const d = document.getElementById('mobile-drawer');
  const o = document.getElementById('mobile-overlay');
  const isOpen = d.classList.contains('open');
  if(isOpen){ closeDrawer(); }
  else {
    syncDrawerList();
    d.classList.add('open');
    o.classList.add('show');
    document.getElementById('mn-list').classList.add('active');
  }
}

function closeDrawer(){
  document.getElementById('mobile-drawer').classList.remove('open');
  document.getElementById('mobile-overlay').classList.remove('show');
  document.getElementById('mn-list').classList.remove('active');
}

function syncDrawerList(){
  const mdTitle = document.getElementById('md-title');
  const mdList  = document.getElementById('md-list');
  const mdVt    = document.getElementById('md-vt');
  if(!mdList) return;
  
  const titles = {day:'Chọn ngày', week:'Chọn tuần', month:'Chọn tháng'};
  mdTitle.textContent = titles[MODE];
  mdVt.style.display = MODE==='day'?'none':'flex';

  // Clone sidebar list content into drawer
  const sbList = document.getElementById('sb-list');
  if(sbList){
    mdList.innerHTML = '';
    const clone = sbList.cloneNode(true);
    // Update onclick handlers in clone
    clone.querySelectorAll('.sb-item').forEach(el=>{
      const key = el.dataset.key;
      el.onclick = ()=>{ selectItem(key); closeDrawer(); };
    });
    clone.querySelectorAll('.sb-grp-lbl').forEach(el=>{
      el.style.cssText += 'color:#94a3b8;font-size:11px;padding:8px 8px 4px';
    });
    clone.querySelectorAll('.sb-item').forEach(el=>{
      el.style.cssText += 'padding:8px 10px;border-radius:6px;margin-bottom:2px';
      el.querySelectorAll('.sb-item-tag').forEach(t=>t.style.color='#94a3b8');
      el.querySelectorAll('.sb-item-val').forEach(v=>v.style.color='#93c5fd');
    });
    mdList.appendChild(clone);
  }
}

// Patch selectItem to also close drawer on mobile
const _origSelectItem = selectItem;
window.selectItem = function(key){
  _origSelectItem(key);
  if(isMobile()) closeDrawer();
};

// Wrap tables for mobile scroll after render
const _origRender = render;
window.render = function(){
  _origRender();
  // Wrap any bare .bt tables that aren't in bt-wrap
  if(isMobile()){
    document.querySelectorAll('.bt').forEach(t=>{
      if(!t.parentElement.classList.contains('bt-wrap')){
        const wrap = document.createElement('div');
        wrap.className = 'bt-wrap';
        t.parentNode.insertBefore(wrap, t);
        wrap.appendChild(t);
      }
    });
  }
};

</script>

<!-- MOBILE BOTTOM NAV -->
<nav id="mobile-nav">
  <div class="mn-tabs">
    <button class="mn-tab active" id="mn-day" onclick="mobileTab('day')">
      <span class="mn-tab-icon">📅</span><span class="mn-tab-lbl">Ngày</span>
    </button>
    <button class="mn-tab" id="mn-week" onclick="mobileTab('week')">
      <span class="mn-tab-icon">📊</span><span class="mn-tab-lbl">Tuần</span>
    </button>
    <button class="mn-tab" id="mn-month" onclick="mobileTab('month')">
      <span class="mn-tab-icon">📈</span><span class="mn-tab-lbl">Tháng</span>
    </button>
    <button class="mn-tab" id="mn-list" onclick="toggleDrawer()">
      <span class="mn-tab-icon">☰</span><span class="mn-tab-lbl">Chọn</span>
    </button>
    <button class="mn-tab" onclick="mobileToggleView()">
      <span class="mn-tab-icon" id="mn-view-icon">🔢</span><span class="mn-tab-lbl" id="mn-view-lbl">Tổng</span>
    </button>
  </div>
</nav>

<!-- MOBILE DRAWER -->
<div id="mobile-overlay" onclick="closeDrawer()"></div>
<div id="mobile-drawer">
  <div class="md-header">
    <span class="md-title" id="md-title">Chọn ngày</span>
    <button class="md-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="md-vt" id="md-vt" style="display:none">
    <div class="md-vt-btn active" id="md-btn-tot" onclick="mdSetView('total')">Tổng</div>
    <div class="md-vt-btn" id="md-btn-avg" onclick="mdSetView('avg')">TB/ngày</div>
  </div>
  <div style="padding:8px 12px" id="md-list"></div>
</div>
